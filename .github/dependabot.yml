version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    # github-actions and docker ecosystems do not track semver, so only
    # default-days is supported on their cooldown blocks.
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-patch-days: 3
    groups:
      node-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "swagger-typescript-api"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7

  - package-ecosystem: gomod
    directories:
      - /server
      - /server/fake-antminer
      - /server/fake-proto-rig
      - /plugin/proto
      - /plugin/antminer
      - /plugin/virtual
      - /tests/plugin-contract
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-patch-days: 3
    groups:
      go-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: cargo
    directories:
      - /sdk/rust/proto-fleet-plugin
      - /plugin/asicrs
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-patch-days: 3
    groups:
      rust-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
