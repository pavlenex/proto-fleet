name: Virtual Plugin Checks

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/protofleet-virtual-plugin-checks.yml"
      - ".github/actions/go-cache-setup/action.yml"
      - ".github/actions/hermit-setup/action.yml"
      - "bin/hermit.hcl"
      - "hermit-packages/**"
      - "go.work"
      - "go.work.sum"
      - "server/go.mod"
      - "server/go.sum"
      - "server/sdk/**"
      - "plugin/virtual/**"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  virtual-plugin:
    name: Virtual Plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin/virtual
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Configure Go cache
        uses: ./.github/actions/go-cache-setup

      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Build
        run: go build ./...
