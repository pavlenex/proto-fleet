name: ProtoFleet E2E Tests

on:
  schedule:
    # Run daily at 6 AM UTC on main branch
    - cron: "0 6 * * *"
  workflow_dispatch:
  workflow_call:

jobs:
  detect-specs:
    runs-on: ubuntu-latest
    outputs:
      setup_specs: ${{ steps.detect.outputs.setup_specs }}
      specs: ${{ steps.detect.outputs.specs }}
      projects: ${{ steps.detect.outputs.projects }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect spec files and projects
        id: detect
        run: |
          cd client/e2eTests/protoFleet/spec

          SETUP_SPEC_FILES=$( (find . -name "*.spec.ts" | sed 's|^\./||' | sort | grep -E '^[0-9]{2}-.*\.spec\.ts$' || true) | jq -R . | jq -cs .)
          SPEC_FILES=$( (find . -name "*.spec.ts" | sed 's|^\./||' | sort | grep -Ev '^[0-9]{2}-.*\.spec\.ts$' || true) | jq -R . | jq -cs .)
          PROJECTS='["desktop", "mobile"]'

          echo "setup_specs=${SETUP_SPEC_FILES}" >> $GITHUB_OUTPUT
          echo "specs=${SPEC_FILES}" >> $GITHUB_OUTPUT
          echo "projects=${PROJECTS}" >> $GITHUB_OUTPUT

          echo "Detected setup specs: ${SETUP_SPEC_FILES}"
          echo "Detected specs: ${SPEC_FILES}"
          echo "Projects to run: ${PROJECTS}"

  build:
    name: Build client and plugins
    needs: detect-specs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Configure Go cache
        uses: ./.github/actions/go-cache-setup

      # Restore-only: the E2E shard job saves this key with an additional
      # `~/.cache/ms-playwright` path. Cache keys are immutable, so if this job
      # saved first it would permanently lock the shards out of caching their
      # Playwright browsers. Restore here, save there.
      - name: Restore Node modules cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            client/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build ProtoFleet
        working-directory: client
        run: |
          # Skip lint in CI to avoid import order issues from merged main branch
          npm run build:protoFleet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Docker cache is computed before the plugin build so the gitignored
      # `server/plugins/*` binaries (not a Docker build input) don't enter
      # the hash and spuriously bust the cache.
      #
      # Scheduled runs skip restore + save so they rebuild against fresh
      # upstream base images without polluting the cache namespace with
      # one-off entries that would evict other workflow caches.
      - name: Restore Docker image cache
        id: docker-image-cache
        if: github.event_name != 'schedule'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/docker-images
          # `server/**` because the Dockerfile does `COPY server/ ./`
          # (e.g. go:embed migrations).
          key: ${{ runner.os }}-protofleet-e2e-docker-${{ hashFiles('server/**') }}

      - name: Build E2E Docker images
        if: steps.docker-image-cache.outputs.cache-hit != 'true'
        working-directory: server
        run: |
          mkdir -p /tmp/docker-images
          # `--ignore-buildable` pulls only services with `image:` and no
          # `build:` (otel-collector, jaeger). `docker save` below otherwise
          # fails on a cold runner because those images don't exist locally.
          echo "::group::docker compose pull"
          docker compose pull --ignore-buildable
          echo "::endgroup::"
          # `--pull` forces fresh upstream base images on rebuild so a stale
          # cache miss key doesn't serve stale FROM layers.
          echo "::group::docker compose build"
          docker compose build --pull
          echo "::endgroup::"
          echo "::group::Save images to compressed tarball"
          mapfile -t images < <(docker compose config --images | sort -u)
          printf '  - %s\n' "${images[@]}"
          docker save "${images[@]}" | gzip > /tmp/docker-images/e2e-images.tar.gz
          ls -lh /tmp/docker-images/
          echo "::endgroup::"

      - name: Save Docker image cache
        if: github.event_name != 'schedule' && steps.docker-image-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-protofleet-e2e-docker-${{ hashFiles('server/**') }}

      - name: Build plugins for CI (Linux AMD64)
        run: |
          # CI runners use linux/amd64, not arm64
          # CGO_ENABLED=0 creates static binaries that work in Alpine (musl libc)
          echo "Syncing Go workspace..."
          go work sync
          echo "Building static plugins for Linux AMD64..."
          mkdir -p server/plugins
          (cd plugin/proto && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../../server/plugins/proto-plugin .)
          (cd plugin/antminer && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../../server/plugins/antminer-plugin .)
          chmod +x server/plugins/proto-plugin server/plugins/antminer-plugin
          echo "Plugins built successfully"

      - name: Upload client build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: protofleet-client-dist
          path: client/dist
          if-no-files-found: error
          retention-days: 1

      - name: Upload plugins
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: protofleet-plugins
          path: server/plugins
          if-no-files-found: error
          retention-days: 1

      - name: Upload Docker images
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: protofleet-e2e-docker-images
          path: /tmp/docker-images/e2e-images.tar.gz
          if-no-files-found: error
          retention-days: 1

  e2e-tests:
    needs: [detect-specs, build]
    timeout-minutes: 40
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        spec: ${{ fromJson(needs.detect-specs.outputs.specs) }}
        project: ${{ fromJson(needs.detect-specs.outputs.projects) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set artifact name
        id: artifact
        env:
          MATRIX_SPEC: ${{ matrix.spec }}
        run: |
          # Sanitize spec name for use in artifact names
          SPEC_NAME=$(printf '%s' "$MATRIX_SPEC" | sed 's/\.spec\.ts$//' | sed 's/[^a-zA-Z0-9]/-/g')
          echo "spec_name=${SPEC_NAME}" >> "$GITHUB_OUTPUT"

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup
        with:
          preinstall: "false"

      - name: Cache Node modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            client/node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: client/e2eTests/protoFleet
        run: npx playwright install --with-deps chromium

      - name: Download prebuilt client
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: protofleet-client-dist
          path: client/dist

      - name: Download prebuilt plugins
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: protofleet-plugins
          path: server/plugins

      - name: Make plugins executable
        run: chmod +x server/plugins/proto-plugin server/plugins/antminer-plugin

      - name: Download prebuilt Docker images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: protofleet-e2e-docker-images
          path: /tmp/docker-images

      - name: Load Docker images
        run: |
          gunzip < /tmp/docker-images/e2e-images.tar.gz | docker load

      - name: Start services (TimeScaleDB + Backend + Simulators)
        working-directory: server
        # --no-build: fail loudly on a missing image rather than falling back
        # to a per-shard rebuild (the cost this change is eliminating).
        run: docker compose up -d --no-build

      - name: Start frontend
        working-directory: client
        env:
          VITE_VERSION: ${{ github.sha }}
          VITE_BUILD_DATE: ${{ github.event.repository.updated_at }}
          VITE_COMMIT: ${{ github.sha }}
        run: |
          # Start frontend in background (already built in earlier step)
          npx vite preview --mode protoFleet --port 5173 --host &
          VITE_PID=$!
          echo "Vite PID: $VITE_PID"

          # Wait for frontend to be ready
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -f http://localhost:5173 2>/dev/null; do sleep 2; done'
          echo "Frontend is ready!"

      - name: Run Playwright tests (${{ matrix.project }} - ${{ matrix.spec }})
        working-directory: client/e2eTests/protoFleet
        env:
          CI: true
          MATRIX_PROJECT: ${{ matrix.project }}
          MATRIX_SPEC: ${{ matrix.spec }}
          SPEC_NAME: ${{ steps.artifact.outputs.spec_name }}
        run: |
          rm -rf blob-report playwright-report test-results
          mkdir -p blob-report

          # The viewport-matched setup project (setup-$MATRIX_PROJECT):
          # onboarding + pools + auth storageState runs automatically before
          # the target via project `dependencies`.
          PLAYWRIGHT_BLOB_OUTPUT_FILE="blob-report/${MATRIX_PROJECT}-${SPEC_NAME}.zip" \
          PWTEST_BLOB_DO_NOT_REMOVE=1 \
          npx playwright test --project="$MATRIX_PROJECT" --reporter=blob "spec/$MATRIX_SPEC"

          echo "Blob reports created:"
          find blob-report -maxdepth 2 -type f -print | sort || true

      - name: Upload blob report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && !cancelled() }}
        with:
          name: blob-report-${{ matrix.project }}-${{ steps.artifact.outputs.spec_name }}
          path: client/e2eTests/protoFleet/blob-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() && !cancelled() }}
        with:
          name: screenshots-${{ matrix.project }}-${{ steps.artifact.outputs.spec_name }}
          path: client/e2eTests/protoFleet/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Dump backend logs on failure
        if: failure()
        working-directory: server
        run: |
          echo "=== Fleet API Logs ==="
          docker compose logs fleet-api
          echo "=== TimescaleDB Logs ==="
          docker compose logs timescaledb

      - name: Cleanup
        if: always()
        working-directory: server
        run: docker compose down -v

  merge-reports:
    name: Merge Test Reports
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: ${{ always() && !cancelled() }}
    permissions:
      contents: read
    outputs:
      desktop-report-path: ${{ steps.merge.outputs.desktop-report-path }}
      mobile-report-path: ${{ steps.merge.outputs.mobile-report-path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup
        with:
          preinstall: "false"

      # Restore-only: see the build job for rationale — the E2E shard owns the
      # shared node cache key so it can include the Playwright browser cache.
      - name: Restore Node modules cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            client/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: blob-report-*
          path: /tmp/blob-reports
          merge-multiple: false

      - name: Merge blob reports into HTML reports
        id: merge
        working-directory: client/e2eTests/protoFleet
        run: |
          echo "Merging blob reports..."
          mkdir -p merged-reports

          # Organize blob reports by project
          mkdir -p /tmp/desktop-blobs /tmp/mobile-blobs

          # Copy all desktop blob reports
          find /tmp/blob-reports -name "blob-report-desktop-*" -type d | while read dir; do
            if [ "$(find "$dir" -name "*.zip" | wc -l)" -gt 0 ]; then
              cp -r "$dir"/* /tmp/desktop-blobs/ 2>/dev/null || true
            fi
          done

          # Copy all mobile blob reports  
          find /tmp/blob-reports -name "blob-report-mobile-*" -type d | while read dir; do
            if [ "$(find "$dir" -name "*.zip" | wc -l)" -gt 0 ]; then
              cp -r "$dir"/* /tmp/mobile-blobs/ 2>/dev/null || true
            fi
          done

          # Merge desktop reports
          if [ "$(find /tmp/desktop-blobs -name "*.zip" 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "Merging desktop reports..."
            mkdir -p merged-reports/desktop/test-results
            PLAYWRIGHT_HTML_OUTPUT_DIR=merged-reports/desktop/playwright-report \
            PLAYWRIGHT_JUNIT_OUTPUT_FILE=merged-reports/desktop/test-results/results.xml \
            npx playwright merge-reports --reporter=html,junit /tmp/desktop-blobs
            echo "desktop-report-path=client/e2eTests/protoFleet/merged-reports/desktop" >> $GITHUB_OUTPUT
          else
            echo "No desktop blob reports found"
          fi

          # Merge mobile reports  
          if [ "$(find /tmp/mobile-blobs -name "*.zip" 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "Merging mobile reports..."
            mkdir -p merged-reports/mobile/test-results
            PLAYWRIGHT_HTML_OUTPUT_DIR=merged-reports/mobile/playwright-report \
            PLAYWRIGHT_JUNIT_OUTPUT_FILE=merged-reports/mobile/test-results/results.xml \
            npx playwright merge-reports --reporter=html,junit /tmp/mobile-blobs
            echo "mobile-report-path=client/e2eTests/protoFleet/merged-reports/mobile" >> $GITHUB_OUTPUT
          else
            echo "No mobile blob reports found"
          fi

          echo "Report merging completed"
          ls -la merged-reports/ || true

      - name: Upload merged Playwright reports
        id: merged-report-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-protofleet-merged
          path: client/e2eTests/protoFleet/merged-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Install Testmo CLI
        if: ${{ !cancelled() && github.event_name == 'schedule' }}
        run: |
          npm install -g @testmo/testmo-cli@1.0.0

      - name: Submit test results to Testmo (Desktop)
        if: ${{ !cancelled() && github.event_name == 'schedule' && steps.merge.outputs.desktop-report-path }}
        working-directory: client/e2eTests/protoFleet/merged-reports/desktop
        env:
          TESTMO_TOKEN: ${{ secrets.TESTMO_TOKEN }}
        run: |
          # Add XML declaration if missing (Playwright sometimes omits it on CI)
          if [ -f "test-results/results.xml" ]; then
            if ! head -n 1 test-results/results.xml | grep -q '<?xml'; then
              echo "XML declaration missing, adding it..."
              echo '<?xml version="1.0" encoding="UTF-8"?>' | cat - test-results/results.xml > test-results/results-fixed.xml
              mv test-results/results-fixed.xml test-results/results.xml
              echo "First 2 lines after fix:"
              head -n 2 test-results/results.xml
            else
              echo "XML declaration already present"
            fi

            testmo automation:run:submit \
              --instance https://proto.testmo.net \
              --project-id 2 \
              --name "ProtoFleet E2E Tests Desktop - $(date +'%Y-%m-%d %H:%M')" \
              --source "protofleet-e2e-tests-desktop" \
              --results test-results/*.xml
          else
            echo "No desktop test results found"
          fi

      - name: Submit test results to Testmo (Mobile)
        if: ${{ !cancelled() && github.event_name == 'schedule' && steps.merge.outputs.mobile-report-path }}
        working-directory: client/e2eTests/protoFleet/merged-reports/mobile
        env:
          TESTMO_TOKEN: ${{ secrets.TESTMO_TOKEN }}
        run: |
          # Add XML declaration if missing (Playwright sometimes omits it on CI)
          if [ -f "test-results/results.xml" ]; then
            if ! head -n 1 test-results/results.xml | grep -q '<?xml'; then
              echo "XML declaration missing, adding it..."
              echo '<?xml version="1.0" encoding="UTF-8"?>' | cat - test-results/results.xml > test-results/results-fixed.xml
              mv test-results/results-fixed.xml test-results/results.xml
              echo "First 2 lines after fix:"
              head -n 2 test-results/results.xml
            else
              echo "XML declaration already present"
            fi

            testmo automation:run:submit \
              --instance https://proto.testmo.net \
              --project-id 2 \
              --name "ProtoFleet E2E Tests Mobile - $(date +'%Y-%m-%d %H:%M')" \
              --source "protofleet-e2e-tests-mobile" \
              --results test-results/*.xml
          else
            echo "No mobile test results found"
          fi

      - name: Note report availability
        env:
          MERGED_REPORT_ARTIFACT_URL: ${{ steps.merged-report-artifact.outputs.artifact-url }}
        run: |
          echo "## 🎭 ProtoFleet E2E Test Reports" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "${MERGED_REPORT_ARTIFACT_URL}" ]]; then
            echo "📦 **[Download merged Playwright report artifact](${MERGED_REPORT_ARTIFACT_URL})**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "📦 **Merged test reports:** Available in the artifacts section as \`playwright-report-protofleet-merged\`" >> "$GITHUB_STEP_SUMMARY"
          fi
