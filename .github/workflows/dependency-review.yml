name: Dependency Review

on:
  workflow_call:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Skip on non-public repositories
        if: ${{ github.event.repository.private }}
        run: |
          echo "Dependency Review is only enforced for public repositories." >> "$GITHUB_STEP_SUMMARY"
          echo "This repository is currently internal/private, so the dependency review action is skipped." >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout code
        if: ${{ !github.event.repository.private }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency Review
        if: ${{ !github.event.repository.private }}
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-scopes: runtime,unknown
          fail-on-severity: moderate
