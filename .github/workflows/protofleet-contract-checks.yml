name: Plugin Contract Checks

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/protofleet-contract-checks.yml"
      - ".github/actions/go-cache-setup/action.yml"
      - ".github/actions/hermit-setup/action.yml"
      - "bin/hermit.hcl"
      - "hermit-packages/**"
      - "go.work"
      - "go.work.sum"
      - "justfile"
      - "tests/plugin-contract/**"
      - "server/go.mod"
      - "server/go.sum"
      - "server/sdk/**"
      - "plugin/asicrs/**"
      - "plugin/proto/**"
      - "plugin/antminer/**"
      - "sdk/rust/**"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Configure Go cache
        uses: ./.github/actions/go-cache-setup

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # buildx's type=gha cache backend reads ACTIONS_RUNTIME_TOKEN and
      # ACTIONS_CACHE_URL (aka ACTIONS_RESULTS_URL) from the environment. These
      # aren't exposed to plain `run:` steps by default, so export them here.
      - name: Expose GitHub Actions runtime to buildx
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      - name: Build plugins and run contract tests
        run: just test-contract
