name: Server Checks

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/protofleet-server-checks.yml"
      - ".github/actions/go-cache-setup/action.yml"
      - ".github/actions/hermit-setup/action.yml"
      - "bin/hermit.hcl"
      - "hermit-packages/**"
      - "go.work"
      - "go.work.sum"
      - "proto/**"
      - "server/**"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  # Lint and build+test run as separate jobs so they execute in parallel on
  # two runners instead of serially on one. They share the Go build cache.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Configure Go cache
        uses: ./.github/actions/go-cache-setup

      - name: Check formatting
        run: golangci-lint fmt --diff -c .golangci.yaml

      - name: Lint
        run: just lint

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Configure Go cache
        uses: ./.github/actions/go-cache-setup

      - name: Build
        run: just build

      # The timescaledb service is built from server/timescaledb/ and has no
      # `image:`, so a cold runner rebuilds it on every `just db-up` (~30s of
      # the step). Cache the built image (same approach as the E2E build job)
      # and load it first so `docker compose up` finds it and skips the build.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Rotate the cache weekly (ISO year-week) so a cache hit still rebuilds
      # against fresh upstream base images and packages (ubuntu, PostgreSQL,
      # TimescaleDB, pgvector) within a week, not only when a file under
      # server/timescaledb/ changes.
      - name: Compute image cache week
        id: cache-week
        run: echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"

      - name: Restore TimescaleDB image cache
        id: tsdb-image-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-server-timescaledb-${{ steps.cache-week.outputs.week }}-${{ hashFiles('server/timescaledb/**') }}

      - name: Build TimescaleDB image
        if: steps.tsdb-image-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-images
          # `--pull` refreshes the upstream base images on a rebuild.
          docker compose build --pull timescaledb
          image="$(docker compose config --images timescaledb)"
          docker save "$image" | gzip > /tmp/docker-images/timescaledb.tar.gz

      - name: Save TimescaleDB image cache
        if: steps.tsdb-image-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-server-timescaledb-${{ steps.cache-week.outputs.week }}-${{ hashFiles('server/timescaledb/**') }}

      - name: Load TimescaleDB image
        if: steps.tsdb-image-cache.outputs.cache-hit == 'true'
        run: gunzip < /tmp/docker-images/timescaledb.tar.gz | docker load

      - name: Start database
        run: just db-up

      - name: Test
        run: just test
