x-extends:
  file: ./docker-compose.base.yaml

services:
  fleet-api:
    extends:
      file: ./docker-compose.base.yaml
      service: fleet-api
    build:
      context: ..
      dockerfile: server/Dockerfile.dev
      args:
        GO_GCFLAGS: "${GO_GCFLAGS:-}"
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - testing/
            - e2e/
            - plugins/
            - "**/*.http"
            - "**/*.md"
            - "**/*.yaml"
            - "**/*.yml"
            - "**/*.json"
            - "**/*.sh"
            - "**/Dockerfile*"
        - action: rebuild
          path: ./go.mod
        - action: rebuild
          path: ./go.sum
        - action: rebuild
          path: ../go.work
    environment:
      AUTH_CLIENT_SECRET_KEY: "${AUTH_CLIENT_SECRET_KEY:-00000000000000000000000000000000000000000000}"
      AUTH_CLIENT_EXPIRATION_PERIOD: "168h" # Override to 168h for development
      DB_USERNAME: "fleet"
      DB_PASSWORD: "fleet"
      ENCRYPT_SERVICE_MASTER_KEY: "EV0g7BoFQnqshvzep9knZsUUmvsqSBsjDAJus7ri0B8="
      INFRASTRUCTURE_OT_CONTROL_SUBNETS: "${INFRASTRUCTURE_OT_CONTROL_SUBNETS:-}"
      PLUGINS_DIR: "/app/plugins"
      PLUGINS_ENABLED: "true"
      PROTO_MINER_PORT: "8080"
      # Containers on fleet-network can reach the translator by service name.
      # Override with a LAN IP/hostname when testing physical miners.
      SV2_TRANSLATOR_ADVERTISED_HOST: "${SV2_TRANSLATOR_ADVERTISED_HOST:-sv2-tproxy}"
      SV2_TRANSLATOR_CONNECT_HOST: "sv2-tproxy"
    depends_on:
      timescaledb:
        condition: service_healthy
      sv2-translator-helper:
        condition: service_healthy
    volumes:
      - ./plugins:/app/plugins:ro
      - sv2-translator-data:/var/lib/proto-fleet/sv2
      - sv2-translator-control:/run/proto-fleet-sv2-helper:ro
    restart: unless-stopped
    networks:
      - fleet-network
    ports:
      - "4000:4000"

  sv2-translator-helper:
    build:
      context: ..
      dockerfile: server/Dockerfile.dev
      args:
        GO_GCFLAGS: "${GO_GCFLAGS:-}"
    command: ["/app/out/sv2-translator-helper"]
    restart: unless-stopped
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/proto-fleet-sv2-helper/runtime.sock"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 1s
    volumes:
      - sv2-translator-control:/run/proto-fleet-sv2-helper
      - /var/run/docker.sock:/var/run/docker.sock

  sv2-tproxy:
    image: stratumv2/translator_sv2:main@sha256:70f7edbce640f0e70e44757d700de72ce286da95849b1b2692d250d4d549826d
    container_name: proto-fleet-sv2-tproxy
    profiles: ["sv2-tproxy"]
    environment:
      APP: "translator_sv2 -c /etc/proto-fleet/sv2/tproxy.toml"
    labels:
      com.protofleet.component: "sv2-tproxy"
      com.protofleet.image: "stratumv2/translator_sv2:main@sha256:70f7edbce640f0e70e44757d700de72ce286da95849b1b2692d250d4d549826d"
    ports:
      - "34255:34255"
    volumes:
      - sv2-translator-data:/etc/proto-fleet/sv2:ro
    restart: unless-stopped
    networks:
      - fleet-network

  timescaledb:
    extends:
      file: ./docker-compose.base.yaml
      service: timescaledb
    build:
      context: ./timescaledb
    # Development performance optimizations
    # NOTE: This command completely overrides the base config. Keep work_mem in sync
    # with docker-compose.base.yaml (Docker Compose replaces arrays, doesn't merge them).
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "fsync=off"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "full_page_writes=off"
      - "-c"
      - "checkpoint_timeout=30min"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "timescaledb.max_background_workers=4"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "shared_preload_libraries=timescaledb,pg_stat_statements"
      # Utility statements can embed secrets; keep them out of pg_stat_statements
      - "-c"
      - "pg_stat_statements.track_utility=off"
    volumes:
      - timescaledb-data:/home/postgres/pgdata/data
      # Use tmpfs for temporary files to speed up operations
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 256M
    # Faster health checks for development
    healthcheck:
      test: [ "CMD-SHELL", "psql -U fleet -d fleet -c 'SELECT 1' > /dev/null 2>&1" ]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Development-specific services
  fake-proto-rig:
    build:
      context: ..
      dockerfile: server/fake-proto-rig/Dockerfile
    environment:
      HTTP_PORT: "8080"
      FAKE_RIG_PASSWORD: "proto"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 8080
    deploy:
      replicas: 5 # Default is 5 instances, can be overridden with --scale
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S19 XP"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      USERNAME: "root19"
      PASSWORD: "root19"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer-high-temp:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S17"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      ERROR_BOARD_TEMP: "96.0"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer-hw-errors:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S21"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      ERROR_HW_PERCENT: "6.5"
      ERROR_HW_COUNT: "1500"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer-board-dead:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S21 XP"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      USERNAME: "root21"
      PASSWORD: "root21"
      ERROR_BOARD_NOT_ALIVE: "true"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer-pool-issues:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S17 XP"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      USERNAME: "root17"
      PASSWORD: "root17"
      ERROR_POOL_NOT_ALIVE: "true"
      ERROR_POOL_GET_FAILURES: "15"
      ERROR_BOARD_NOT_HASHING: "true"
      ERROR_FAN_FAILED: "true"
      ERROR_PSU_FAULT: "true"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  fake-antminer-rejected-shares:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S18"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
      ERROR_REJECTED_PERCENT: "12.0"
      ERROR_STALE_COUNT: "150"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    expose:
      - 4028
      - 80
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  proto-sim:
    build:
      context: ..
      dockerfile: server/fake-proto-rig/Dockerfile
    environment:
      HTTP_PORT: "8080"
      SERIAL_NUMBER: "PROTO-SIM-001"
      FAKE_RIG_PASSWORD: "proto"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
  antminer-sim:
    build:
      context: ./fake-antminer
      dockerfile: Dockerfile
    environment:
      MINER_TYPE: "Antminer S19"
      FIRMWARE_VERSION: "Antminer S19 XP 140Th 15/01/2023 10:30:25"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "4028:4028"
      - "8008:80"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - fleet-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
volumes:
  timescaledb-data:
  sv2-translator-data:
  sv2-translator-control:

networks:
  fleet-network:
    ipam:
      config:
        - subnet: "192.168.2.0/24"
          gateway: "192.168.2.1"
