x-extends:
  file: ./server/docker-compose.base.yaml

services:
  fleet-api:
    extends:
      file: ./server/docker-compose.base.yaml
      service: fleet-api
    build:
      context: ./server
    environment:
      LOG_LEVEL: "INFO"
      AUTH_CLIENT_SECRET_KEY: "${AUTH_CLIENT_SECRET_KEY}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_DSN: "${DB_DSN:-}"
      ENCRYPT_SERVICE_MASTER_KEY: "${ENCRYPT_SERVICE_MASTER_KEY}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-true}"
      PLUGINS_DIR: "/app/plugins"
      PLUGINS_ENABLED: "true"
      ENABLE_VIRTUAL_MINERS: "${ENABLE_VIRTUAL_MINERS:-false}"
      VIRTUAL_MINER_CONFIG: "/app/plugins/virtual-plugin.json"
      VIRTUAL_MINER_COUNT: "${VIRTUAL_MINER_COUNT:-}"
      VIRTUAL_MINER_IP_START: "${VIRTUAL_MINER_IP_START:-}"
      VIRTUAL_MINER_SERIAL_PREFIX: "${VIRTUAL_MINER_SERIAL_PREFIX:-}"
      VIRTUAL_MINER_BASELINE_VARIANCE_PERCENT: "${VIRTUAL_MINER_BASELINE_VARIANCE_PERCENT:-}"
      # Host-profile tunables (deployment-files/profiles/); defaults mirror
      # the Go config defaults so unprofiled installs are unchanged
      DB_MAX_OPEN_CONNS: "${DB_MAX_OPEN_CONNS:-250}"
      DB_MAX_IDLE_CONNS: "${DB_MAX_IDLE_CONNS:-50}"
      TELEMETRY_FETCH_INTERVAL: "${TELEMETRY_FETCH_INTERVAL:-5s}"
      TELEMETRY_STALENESS_THRESHOLD: "${TELEMETRY_STALENESS_THRESHOLD:-20s}"
      TELEMETRY_CONCURRENCY_LIMIT: "${TELEMETRY_CONCURRENCY_LIMIT:-500}"
      TELEMETRY_METRIC_TIMEOUT: "${TELEMETRY_METRIC_TIMEOUT:-5s}"
      TIMESCALEDB_QUERY_TIMEOUT: "${TIMESCALEDB_QUERY_TIMEOUT:-60s}"
      TIMESCALEDB_MAX_TIME_SERIES_ROWS: "${TIMESCALEDB_MAX_TIME_SERIES_ROWS:-100000}"
      TIMESCALEDB_ASYNC_METRIC_COMMIT: "${TIMESCALEDB_ASYNC_METRIC_COMMIT:-false}"
      FLEET_COMMAND_MAX_WORKERS: "${FLEET_COMMAND_MAX_WORKERS:-500}"
      # Deployment-controlled half of the dual Modbus dial allowlist.
      # Empty keeps all infrastructure writes disabled.
      INFRASTRUCTURE_OT_CONTROL_SUBNETS: "${INFRASTRUCTURE_OT_CONTROL_SUBNETS:-}"
      SV2_TRANSLATOR_ENABLED: "true"
      SV2_TRANSLATOR_CONFIG_DIR: "/var/lib/fleet/sv2-translator"
      SV2_TRANSLATOR_ADVERTISE_HOST: "${SV2_TRANSLATOR_ADVERTISE_HOST:-}"
      SV2_TRANSLATOR_CONNECT_HOST: "127.0.0.1"
    depends_on:
      timescaledb:
        condition: service_healthy
      sv2-translator:
        condition: service_started
    volumes:
      - sv2-translator-config:/var/lib/fleet/sv2-translator
    restart: always
    network_mode: host
    extra_hosts:
      - "timescaledb:127.0.0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        compress: "true"

  sv2-translator:
    image: stratumv2/translator_sv2:v0.6.0@sha256:674fa7374deaf36859d2b3ad31df6adc79169d7108a1cd39fe3e14d04a0ca66c
    entrypoint: [ "/bin/sh", "/supervise.sh" ]
    environment:
      CONFIG_DIR: "/config"
    volumes:
      - sv2-translator-config:/config
      - ./sv2-translator/supervise.sh:/supervise.sh:ro
    restart: always
    network_mode: host
    stop_signal: SIGTERM
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        compress: "true"

  fleet-client:
    build:
      context: ./client
    depends_on:
      - fleet-api
    restart: always
    network_mode: host
    environment:
      # Datadog RUM (client observability). All optional — unset keys leave RUM
      # disabled (no-op). Set these in the operator .env to enable without a
      # client rebuild; they are rendered into config.js at container start.
      # DD_CLIENT_TOKEN is a public browser RUM client token, not a secret API key.
      DD_APPLICATION_ID: "${DD_APPLICATION_ID:-}"
      DD_CLIENT_TOKEN: "${DD_CLIENT_TOKEN:-}"
      DD_SITE: "${DD_SITE:-}"
      DD_SERVICE: "${DD_SERVICE:-}"
      DD_ENV: "${DD_ENV:-}"
      DD_RUM_SAMPLE_RATE: "${DD_RUM_SAMPLE_RATE:-}"
      DD_SESSION_REPLAY_SAMPLE_RATE: "${DD_SESSION_REPLAY_SAMPLE_RATE:-}"
      DD_TRACE_SAMPLE_RATE: "${DD_TRACE_SAMPLE_RATE:-}"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        compress: "true"

  timescaledb:
    extends:
      file: ./server/docker-compose.base.yaml
      service: timescaledb
    image: proto-fleet-timescaledb:latest
    pull_policy: never
    environment:
      POSTGRES_DB: "${DB_NAME:-fleet}"
      POSTGRES_USER: "${DB_USERNAME:-fleet}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "psql -U ${DB_USERNAME:-fleet} -d ${DB_NAME:-fleet} -c 'SELECT 1' > /dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        compress: "true"

volumes:
  timescaledb-data:
  sv2-translator-config:

networks:
  fleet-network:
    driver: bridge
