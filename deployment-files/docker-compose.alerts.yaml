services:
  fleet-api:
    environment:
      FLEET_ALERTS_ENABLED: "${FLEET_ALERTS_ENABLED:-true}"
      FLEET_ALERTS_FLUSH_INTERVAL: "${FLEET_ALERTS_FLUSH_INTERVAL:-5s}"
      FLEET_ALERTS_BUFFER_SIZE: "${FLEET_ALERTS_BUFFER_SIZE:-4096}"
      # Host-networked fleet-api resolves grafana->127.0.0.1 (extra_hosts), so this must match the published host port.
      FLEET_ALERTS_GRAFANA_URL: "${FLEET_ALERTS_GRAFANA_URL:-http://grafana:3030}"
      FLEET_ALERTS_GRAFANA_TOKEN: "${FLEET_ALERTS_GRAFANA_TOKEN:-}"
      FLEET_ALERTS_GRAFANA_USER: "${FLEET_ALERTS_GRAFANA_USER:-admin}"
      FLEET_ALERTS_GRAFANA_PASSWORD: "${FLEET_ALERTS_GRAFANA_PASSWORD:-}"
      FLEET_ALERTS_WEBHOOK_TOKEN: "${FLEET_ALERTS_WEBHOOK_TOKEN}"
    depends_on:
      grafana:
        condition: service_healthy
    extra_hosts:
      - "grafana:127.0.0.1"

  grafana:
    extends:
      file: ./server/docker-compose.base.yaml
      service: grafana
    environment:
      GRAFANA_DB_PASSWORD: "${GRAFANA_DB_PASSWORD:?GRAFANA_DB_PASSWORD is required (run-fleet.sh provisions it)}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required (run-fleet.sh provisions it)}"
      GF_SECURITY_SECRET_KEY: "${GRAFANA_SECRET_KEY:?GRAFANA_SECRET_KEY is required (run-fleet.sh provisions it)}"
      FLEET_ALERTS_WEBHOOK_TOKEN: "${FLEET_ALERTS_WEBHOOK_TOKEN:?FLEET_ALERTS_WEBHOOK_TOKEN is required (run-fleet.sh provisions it)}"
    volumes:
      - ./server/monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./server/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      # Loopback-only so operators can hit the UI from the host without
      # exposing it on the LAN. Grafana is otherwise reachable only
      # from inside the monitoring network.
      - "127.0.0.1:3030:3000"
    # Grafana's webhook contact point POSTs to
    # http://fleet-api:4000/internal/alertmanager-webhook. fleet-api
    # uses host networking, so we route via the docker host gateway.
    extra_hosts:
      - "fleet-api:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        compress: "true"

volumes:
  grafana-data:

networks:
  monitoring:
    driver: bridge
