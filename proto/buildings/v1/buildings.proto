syntax = "proto3";

package buildings.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "common/v1/fleet_list_stats.proto";
import "errors/v1/errors.proto";
import "google/protobuf/timestamp.proto";

// BuildingService is the admin surface for buildings: per-building
// config (capacity, layout defaults) under a site (or unassigned).
// Buildings coexist with the free-form `device_set_rack.zone` string;
// operators opt into buildings explicitly per the multi-site plan.
service BuildingService {
    // ListBuildings returns every live building in the org with its
    // rack_count. site_ids restricts the result to buildings under any
    // of the given sites; include_unassigned adds the unassigned bucket
    // (building.site_id IS NULL). Leaving both unset returns every
    // building in the org.
    rpc ListBuildings(ListBuildingsRequest) returns (ListBuildingsResponse);

    // GetBuilding returns a single building by id. Returns NotFound if the
    // building does not exist or belongs to another org.
    rpc GetBuilding(GetBuildingRequest) returns (GetBuildingResponse);

    // CreateBuilding inserts a new building. Name must be unique
    // within the assigned site (when site_id is set); unassigned
    // buildings are not name-unique so cascade-unassign on site
    // delete cannot collide.
    rpc CreateBuilding(CreateBuildingRequest) returns (CreateBuildingResponse);

    // UpdateBuilding mutates name, description, capacity, layout
    // defaults. Site assignment is *not* changed by UpdateBuilding —
    // use AssignBuildingsToSite (SiteService) for that, since it has
    // cross-collection enforcement.
    rpc UpdateBuilding(UpdateBuildingRequest) returns (UpdateBuildingResponse);

    // DeleteBuilding soft-deletes the building and, in the same
    // transaction, sets device_set_rack.building_id = NULL on every
    // rack pointing at it. Devices keep their existing site_id.
    rpc DeleteBuilding(DeleteBuildingRequest) returns (DeleteBuildingResponse);

    // ListBuildingRacks returns every rack currently assigned to the
    // building along with its grid placement (aisle_index,
    // position_in_aisle). Used by ManageBuildingModal to seed its
    // grid view; the broader ListDeviceSets RPC stays unaware of
    // grid placement.
    rpc ListBuildingRacks(ListBuildingRacksRequest) returns (ListBuildingRacksResponse);

    // AssignRacksToBuilding sets each rack's building_id and optionally
    // positions it at (aisle_index, position_in_aisle) inside the
    // target building's grid. Leaving target_building_id unset
    // unassigns every rack in the batch from any building. Each entry
    // carries its own optional placement; entries with unset placement
    // have their grid cell cleared (single-call mix of placed + cleared
    // racks is supported). The entire batch runs in one transaction; if
    // any rack fails validation or its update, no row is touched. Runs
    // the same site-cascade for descendant device.site_id that SaveRack
    // runs when a rack's site changes.
    rpc AssignRacksToBuilding(AssignRacksToBuildingRequest) returns (AssignRacksToBuildingResponse);

    // AssignDevicesToBuilding is an all-or-nothing bulk update of
    // device.building_id. If any device is in a rack whose building_id
    // differs from the target, the entire batch rejects with per-device
    // error details and no row is touched. Omit target_building_id (or
    // leave it unset) to move devices to the "Unassigned" bucket. When
    // target_building_id is set, the same transaction also cascades
    // device.site_id to the target building's site so building/site
    // stay in lockstep.
    rpc AssignDevicesToBuilding(AssignDevicesToBuildingRequest)
        returns (AssignDevicesToBuildingResponse);

    // GetBuildingStats returns server-rolled telemetry + miner-state
    // counts for every device whose rack lives in the building, plus a
    // per-rack health summary (rack id, label, position, state counts)
    // sized to the building's aisles × racks_per_aisle floor plan.
    // Drives the /sites BuildingCard.
    rpc GetBuildingStats(GetBuildingStatsRequest) returns (GetBuildingStatsResponse);
}

// RackOrderIndex mirrors device_set/v1's enum. We re-declare it here
// rather than depend on device_set so the buildings module owns its
// own slot of the proto registry.
enum RackOrderIndex {
    RACK_ORDER_INDEX_UNSPECIFIED  = 0;
    RACK_ORDER_INDEX_BOTTOM_LEFT  = 1;
    RACK_ORDER_INDEX_TOP_LEFT     = 2;
    RACK_ORDER_INDEX_BOTTOM_RIGHT = 3;
    RACK_ORDER_INDEX_TOP_RIGHT    = 4;
}

// Building is the read shape returned by Get/List/Create/Update.
message Building {
    int64 id = 1;
    // Unset when unassigned (site_id IS NULL in the database).
    optional int64 site_id = 2;
    string name = 3;
    string description = 4;

    // power_kw / overhead_kw are kilowatts; 0 = unset.
    double power_kw = 5;
    double overhead_kw = 6;

    // Layout defaults; 0 means "not set".
    int32 aisles = 7;
    int32 physical_rack_count = 8;
    int32 racks_per_aisle = 9;
    int32 default_rack_rows = 10;
    int32 default_rack_columns = 11;
    RackOrderIndex default_rack_order_index = 12;

    google.protobuf.Timestamp created_at = 13;
    google.protobuf.Timestamp updated_at = 14;

    // Parent placement refs for display/filter rows. site is unset
    // when this building is unassigned.
    common.v1.PlacementRefs placement = 15;
}

// BuildingWithCounts pairs a Building with its rack_count for the
// list/delete-confirm flows.
message BuildingWithCounts {
    Building building = 1;
    int64 rack_count = 2;
    int64 device_count = 3;
    // Lightweight list/table rollup. Omitted when the caller is not
    // authorized for telemetry stats.
    common.v1.FleetListStats list_stats = 4;
}

// ListBuildings

// Filter shape mirrors the rack and miner list filters: site_ids is an
// OR across sites; include_unassigned is independently combinable.
// Leaving both unset returns every building in the org.
message ListBuildingsRequest {
    // Filter by site (OR across IDs). Each entry must be > 0; capped at
    // 1024 to bound request size (matches the rack/miner list filters).
    repeated int64 site_ids = 1 [(buf.validate.field).repeated = {
        max_items: 1024
        items: {
            int64: {gt: 0}
        }
    }];

    // When true, buildings with site_id IS NULL are also included.
    // Independent of site_ids — set only this for the unassigned
    // bucket alone, set both to combine specific sites with unassigned.
    bool include_unassigned = 2;

    // Filter buildings whose rolled-up devices have any open issue
    // matching these component types. OR within the list, AND with
    // other filters.
    repeated errors.v1.ComponentType error_component_types = 3;

    // Filter by rolled-up telemetry values for the building. Multiple
    // ranges are AND'd.
    repeated common.v1.FleetListTelemetryRangeFilter telemetry_ranges = 4;
}

message ListBuildingsResponse {
    repeated BuildingWithCounts buildings = 1;
}

// GetBuilding

message GetBuildingRequest {
    int64 id = 1 [(buf.validate.field).int64.gt = 0];
}

message GetBuildingResponse {
    Building building = 1;
}

// CreateBuilding

message CreateBuildingRequest {
    // Unset = create unassigned. When present, must be > 0.
    optional int64 site_id = 1 [(buf.validate.field).int64.gt = 0];
    string name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    string description = 3 [(buf.validate.field).string.max_len = 4096];

    double power_kw = 4 [(buf.validate.field).double.gte = 0];
    double overhead_kw = 5 [(buf.validate.field).double.gte = 0];

    // Layout dimensions are capped at 100 each. Above that the
    // operator UI's aisles × racks_per_aisle grid renders impractically
    // large (100×100 = 10k cells, still responsive); the cap keeps a
    // typo from allocating a million-node grid in the browser.
    int32 aisles = 6 [(buf.validate.field).int32 = {gte: 0, lte: 100}];
    int32 physical_rack_count = 7 [(buf.validate.field).int32.gte = 0];
    int32 racks_per_aisle = 8 [(buf.validate.field).int32 = {gte: 0, lte: 100}];
    int32 default_rack_rows = 9 [(buf.validate.field).int32.gte = 0];
    int32 default_rack_columns = 10 [(buf.validate.field).int32.gte = 0];
    RackOrderIndex default_rack_order_index = 11 [(buf.validate.field).enum.defined_only = true];

    // default_rack_rows and default_rack_columns must be set
    // together: either both 0 (no defaults) or both > 0.
    option (buf.validate.message).cel = {
        id: "default_rack_dims_paired"
        message: "default_rack_rows and default_rack_columns must both be 0 or both > 0"
        expression: "(this.default_rack_rows == 0) == (this.default_rack_columns == 0)"
    };
}

message CreateBuildingResponse {
    Building building = 1;
}

// UpdateBuilding

message UpdateBuildingRequest {
    int64 id = 1 [(buf.validate.field).int64.gt = 0];

    string name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    string description = 3 [(buf.validate.field).string.max_len = 4096];

    double power_kw = 4 [(buf.validate.field).double.gte = 0];
    double overhead_kw = 5 [(buf.validate.field).double.gte = 0];

    // Layout dimensions are capped at 100 each. Matches the
    // CreateBuildingRequest cap; the operator UI grid is the
    // motivating constraint.
    int32 aisles = 6 [(buf.validate.field).int32 = {gte: 0, lte: 100}];
    int32 physical_rack_count = 7 [(buf.validate.field).int32.gte = 0];
    int32 racks_per_aisle = 8 [(buf.validate.field).int32 = {gte: 0, lte: 100}];
    int32 default_rack_rows = 9 [(buf.validate.field).int32.gte = 0];
    int32 default_rack_columns = 10 [(buf.validate.field).int32.gte = 0];
    RackOrderIndex default_rack_order_index = 11 [(buf.validate.field).enum.defined_only = true];

    option (buf.validate.message).cel = {
        id: "default_rack_dims_paired"
        message: "default_rack_rows and default_rack_columns must both be 0 or both > 0"
        expression: "(this.default_rack_rows == 0) == (this.default_rack_columns == 0)"
    };
}

message UpdateBuildingResponse {
    Building building = 1;
}

// DeleteBuilding

message DeleteBuildingRequest {
    int64 id = 1 [(buf.validate.field).int64.gt = 0];
}

message DeleteBuildingResponse {
    int64 unassigned_rack_count = 1;
}

// ListBuildingRacks

message ListBuildingRacksRequest {
    int64 building_id = 1 [(buf.validate.field).int64.gt = 0];

    // Cursor pagination — defaults to 50 (matches the device-list
    // ergonomics) when page_size is 0, capped at 1000. page_token is
    // an opaque cursor returned by a prior response; empty string
    // starts at the first page. Callers that need the full working
    // set (e.g. ManageBuildingModal seeding) loop until
    // next_page_token is empty.
    int32 page_size = 2 [(buf.validate.field).int32 = {gte: 0, lte: 1000}];
    // 2048 covers the worst-case server-issued cursor: base64-encoded
    // JSON containing a rack label (up to 255 chars, potentially
    // multi-byte) + id + struct overhead. The token is always server-
    // issued so the cap is defensive, not a contract.
    string page_token = 3 [(buf.validate.field).string.max_len = 2048];
}

// BuildingRack is the rack-in-building read shape used by the
// ManageBuildingModal grid. Position fields are unset when the rack
// is a building member without a chosen grid cell.
message BuildingRack {
    int64 rack_id = 1;
    string rack_label = 2;
    optional int32 aisle_index = 3;
    optional int32 position_in_aisle = 4;
}

message ListBuildingRacksResponse {
    repeated BuildingRack racks = 1;
    // Empty when the result fits in one response (current behavior).
    // Future paging implementations should populate this with an
    // opaque cursor the client can send back in the next request's
    // page_token to fetch the next slice.
    string next_page_token = 2;
}

// AssignRacksToBuilding

// RackPlacement carries one rack's identity plus its optional grid
// placement inside the target building. Used by AssignRacksToBuilding
// for bulk updates that mix placed + cleared positions in one call.
message RackPlacement {
    int64 rack_id = 1 [(buf.validate.field).int64.gt = 0];
    // Optional grid placement inside the target building. Must be set
    // together or both unset (a half-set position would be ambiguous).
    // Upper bounds are validated server-side against the target
    // building's aisles / racks_per_aisle.
    optional int32 aisle_index = 2 [(buf.validate.field).int32.gte = 0];
    optional int32 position_in_aisle = 3 [(buf.validate.field).int32.gte = 0];

    // aisle_index and position_in_aisle must be set together or both
    // unset. Setting one without the other is an invalid request.
    option (buf.validate.message).cel = {
        id: "position_pair_required"
        message: "aisle_index and position_in_aisle must both be set or both unset"
        expression: "has(this.aisle_index) == has(this.position_in_aisle)"
    };
}

message AssignRacksToBuildingRequest {
    repeated RackPlacement racks = 1 [(buf.validate.field).repeated = {
        min_items: 1
        max_items: 1000
    }];
    // Unset = unassign racks from any building. When present, must be > 0.
    optional int64 target_building_id = 2 [(buf.validate.field).int64.gt = 0];
}

message AssignRacksToBuildingResponse {
    // Cascade impact: aggregate descendant devices that had their
    // site_id re-stamped across every rack in the batch. Zero when no
    // cascade was needed.
    int64 site_reassigned_device_count = 1;
}

// AssignDevicesToBuilding

message AssignDevicesToBuildingRequest {
    // Unset = move to the "Unassigned" bucket. When present, must be > 0.
    optional int64 target_building_id = 1 [(buf.validate.field).int64.gt = 0];
    repeated string device_identifiers = 2 [(buf.validate.field).repeated = {
        min_items: 1
        max_items: 10000
        items: {string: {min_len: 1, max_len: 256}}
    }];
    // When true, the server — inside the same transaction as the
    // building write — removes any conflicting rack memberships for the
    // listed devices before applying the building assignment. Mirrors
    // the AssignDevicesToSite force-clear semantic: a device currently
    // in a rack at a different building would otherwise reject the whole
    // batch with DEVICE_IN_RACK_AT_OTHER_BUILDING.
    //
    // When false (default), any device currently in a rack at a different
    // building rejects the whole batch with per-device error details.
    optional bool force_clear_conflicting_rack_membership = 3;
}

// PerDeviceBuildingConflictReason enumerates the reasons a device can be
// rejected by AssignDevicesToBuilding.
enum PerDeviceBuildingConflictReason {
    PER_DEVICE_BUILDING_CONFLICT_REASON_UNSPECIFIED                       = 0;
    PER_DEVICE_BUILDING_CONFLICT_REASON_DEVICE_NOT_FOUND                  = 1;
    PER_DEVICE_BUILDING_CONFLICT_REASON_DEVICE_IN_RACK_AT_OTHER_BUILDING  = 2;
    // Device is in a rack whose site_id differs from the target
    // building's site. Surfaces cross-site rack memberships that the
    // building-only conflict check would otherwise miss (e.g. a rack
    // at Site A with no building when the target building lives at
    // Site B). Cleared the same way as IN_RACK_AT_OTHER_BUILDING:
    // force_clear_conflicting_rack_membership drops the rack row in
    // the same transaction.
    PER_DEVICE_BUILDING_CONFLICT_REASON_DEVICE_IN_RACK_AT_OTHER_SITE      = 3;
}

// PerDeviceBuildingConflict carries the per-device error details
// surfaced when AssignDevicesToBuilding rejects. The whole batch is
// rejected; no rows are mutated.
message PerDeviceBuildingConflict {
    string device_identifier = 1;
    PerDeviceBuildingConflictReason reason = 2;
    // When reason == DEVICE_IN_RACK_AT_OTHER_BUILDING: the building_id
    // of the device's rack. 0 otherwise.
    int64 conflicting_building_id = 3;
}

message AssignDevicesToBuildingResponse {
    int64 reassigned_count = 1;
    // Populated only on rejection. Empty on success.
    repeated PerDeviceBuildingConflict conflicts = 2;
    // Number of devices whose site_id was cascaded to the target
    // building's site as part of the same transaction. Zero when no
    // cascade was needed (target unassigned or every device was already
    // at the target site).
    int64 site_reassigned_device_count = 3;
}

// GetBuildingStats

message GetBuildingStatsRequest {
    int64 building_id = 1 [(buf.validate.field).int64.gt = 0];
}

// GetBuildingStatsResponse mirrors DeviceSetStats for the rollup fields
// and adds a rack-level breakdown for the BuildingCard floor plan.
message GetBuildingStatsResponse {
    int64  building_id        = 1;
    int32  rack_count         = 2;
    int32  device_count       = 3;
    int32  reporting_count    = 4;
    double total_hashrate_ths = 5;
    double avg_efficiency_jth = 6;
    double total_power_kw     = 7;
    int32  hashing_count      = 8;
    int32  broken_count       = 9;
    int32  offline_count      = 10;
    int32  sleeping_count     = 11;
    // One entry per rack currently assigned to the building. Positions
    // mirror BuildingRack so callers don't need a second lookup to paint
    // the floor plan. Racks without a position are still returned (the
    // operator can place them via ManageBuildingModal); position fields
    // are unset in that case.
    repeated BuildingRackHealth rack_health = 12;

    // Device identifiers in scope for this building. Returned so the
    // BuildingPage performance + component-error consumers don't have to
    // separately paginate ListMinerStateSnapshots just to learn which
    // devices to query telemetry for — the server already computed this
    // set when summing the rollup fields above.
    //
    // An empty list always means "no devices in this building." The
    // server defensively caps this field at MaxDevicesPerStatsResponse
    // (50k); a building larger than the cap fails the whole RPC with
    // Internal rather than returning a partial set, so an empty list
    // here cannot mean "truncated." If operators ever start hitting the
    // cap we'll switch this to a truncate-with-flag shape (see #339
    // discussion) — for now Internal is the explicit failure mode.
    repeated string device_identifiers = 13;

    // Per-field reporting counts so the FE can distinguish "no devices
    // reporting" from "devices reporting but the field is missing." A
    // reporting device with EfficiencyJH = nil shouldn't make the average
    // look like real data; if efficiency_reporting_count == 0 the FE shows
    // the dash even when reporting_count > 0.
    int32 hashrate_reporting_count    = 14;
    int32 efficiency_reporting_count  = 15;
    int32 power_reporting_count       = 16;
    double min_temperature_c          = 17;
    double max_temperature_c          = 18;
    int32 temperature_reporting_count = 19;
    int32 control_board_issue_count   = 20;
    int32 fan_issue_count             = 21;
    int32 hash_board_issue_count      = 22;
    int32 psu_issue_count             = 23;
}

// BuildingRackHealth is the per-rack rollup returned by GetBuildingStats.
// State counts mirror DeviceSetStats; the FE owns the priority rule that
// collapses them into a single visual state (so design iteration doesn't
// churn the proto).
message BuildingRackHealth {
    int64           rack_id           = 1;
    string          rack_label        = 2;
    optional int32  aisle_index       = 3;
    optional int32  position_in_aisle = 4;
    int32           hashing_count     = 5;
    int32           broken_count      = 6;
    int32           offline_count     = 7;
    int32           sleeping_count    = 8;
}
