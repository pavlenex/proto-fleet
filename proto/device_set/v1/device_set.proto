syntax = "proto3";

package device_set.v1;

import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";
import "common/v1/device_selector.proto";
import "common/v1/sort.proto";
import "common/v1/zone.proto";
import "errors/v1/errors.proto";

// Service for managing device sets (groups and racks)
// Device sets allow grouping devices for filtering and bulk operations
service DeviceSetService {
    // Creates a new device set
    rpc CreateDeviceSet(CreateDeviceSetRequest) returns (CreateDeviceSetResponse);

    // Gets a device set by ID
    rpc GetDeviceSet(GetDeviceSetRequest) returns (GetDeviceSetResponse);

    // Updates a device set's label or description
    rpc UpdateDeviceSet(UpdateDeviceSetRequest) returns (UpdateDeviceSetResponse);

    // Deletes a device set (soft delete)
    rpc DeleteDeviceSet(DeleteDeviceSetRequest) returns (DeleteDeviceSetResponse);

    // Lists all device sets for the organization
    rpc ListDeviceSets(ListDeviceSetsRequest) returns (ListDeviceSetsResponse);

    // Adds devices to a device set
    rpc AddDevicesToDeviceSet(AddDevicesToDeviceSetRequest) returns (AddDevicesToDeviceSetResponse);

    // Removes devices from a device set
    rpc RemoveDevicesFromDeviceSet(RemoveDevicesFromDeviceSetRequest) returns (RemoveDevicesFromDeviceSetResponse);

    // Lists members of a device set
    rpc ListDeviceSetMembers(ListDeviceSetMembersRequest) returns (ListDeviceSetMembersResponse);

    // Gets device sets that a device belongs to
    rpc GetDeviceDeviceSets(GetDeviceDeviceSetsRequest) returns (GetDeviceDeviceSetsResponse);

    // Sets a device's slot position within a rack
    rpc SetRackSlotPosition(SetRackSlotPositionRequest) returns (SetRackSlotPositionResponse);

    // Clears a device's slot position within a rack
    rpc ClearRackSlotPosition(ClearRackSlotPositionRequest) returns (ClearRackSlotPositionResponse);

    // Lists all occupied slot positions in a rack
    rpc GetRackSlots(GetRackSlotsRequest) returns (GetRackSlotsResponse);

    // Returns aggregated telemetry stats for a list of device sets
    rpc GetDeviceSetStats(GetDeviceSetStatsRequest) returns (GetDeviceSetStatsResponse);

    // Returns all distinct rack zone strings for the organization
    // (org-wide, flat). For building-scoped zones use
    // ListRackZoneRefs below.
    rpc ListRackZones(ListRackZonesRequest) returns (ListRackZonesResponse);

    // Returns all distinct (building_id, zone) tuples for the
    // organization with denormalized building + site labels.
    // Use this to feed a building-aware zone dropdown that
    // distinguishes "Room 2" in different buildings.
    rpc ListRackZoneRefs(ListRackZoneRefsRequest) returns (ListRackZoneRefsResponse);

    // Returns all distinct rack types (row/column combinations) for the organization
    rpc ListRackTypes(ListRackTypesRequest) returns (ListRackTypesResponse);

    // Atomically creates or updates a rack with its membership and slot assignments.
    // All operations (metadata, membership, slot positions) are applied in a single transaction.
    rpc SaveRack(SaveRackRequest) returns (SaveRackResponse);
}

// Type of device set
enum DeviceSetType {
    // Unspecified type - returns all types when filtering
    DEVICE_SET_TYPE_UNSPECIFIED = 0;
    // Group: many-to-many relationship (device can belong to multiple groups)
    DEVICE_SET_TYPE_GROUP = 1;
    // Rack: one-to-one relationship (device can only be in one rack)
    DEVICE_SET_TYPE_RACK = 2;
}

// DeviceSet represents a group or rack of devices
message DeviceSet {
    // Unique identifier for the device set
    int64 id = 1;

    // Type of device set (group or rack)
    DeviceSetType type = 2;

    // Human-readable label for the device set
    string label = 3;

    // Optional description of the device set's purpose
    string description = 4;

    // Number of devices in this device set
    int32 device_count = 5;

    // When the device set was created
    google.protobuf.Timestamp created_at = 6;

    // When the device set was last updated
    google.protobuf.Timestamp updated_at = 7;

    // Type-specific metadata (enforces only one detail type is set)
    oneof type_details {
        RackInfo rack_info = 8;
        GroupInfo group_info = 9;
    }
}

// Order index defining where row/column numbering starts in a rack
enum RackOrderIndex {
    RACK_ORDER_INDEX_UNSPECIFIED = 0;
    RACK_ORDER_INDEX_BOTTOM_LEFT = 1;
    RACK_ORDER_INDEX_TOP_LEFT = 2;
    RACK_ORDER_INDEX_BOTTOM_RIGHT = 3;
    RACK_ORDER_INDEX_TOP_RIGHT = 4;
}

// Cooling type for a rack
enum RackCoolingType {
    RACK_COOLING_TYPE_UNSPECIFIED = 0;
    RACK_COOLING_TYPE_AIR = 1;
    RACK_COOLING_TYPE_IMMERSION = 2;
}

// Rack-specific metadata for rack-type device sets
message RackInfo {
    // Number of rows in the rack grid
    int32 rows = 1 [(buf.validate.field).int32.gt = 0];
    // Number of columns in the rack grid
    int32 columns = 2 [(buf.validate.field).int32.gt = 0];
    // Sub-building zone label (e.g. "Room 2", "East Wall"). Required when
    // building_id is set; cleared (empty) automatically when the rack
    // crosses a building boundary or moves to direct-under-site placement.
    string zone = 3 [(buf.validate.field).string.max_len = 100];
    // Order index defining where numbering starts
    RackOrderIndex order_index = 4;
    // Cooling type for this rack
    RackCoolingType cooling_type = 5;
    // Site this rack is assigned to. When building_id is set, the server
    // derives site_id from the parent building; clients should leave it
    // unset and read the derived value from the response.
    //
    // SaveRack update: leaving both site_id and building_id unset
    // preserves the current placement. Send an explicit 0 to unassign.
    optional int64 site_id = 6;
    // Building this rack belongs to. Unset = directly under site_id (or
    // fully unassigned when site_id is also unset). On SaveRack update,
    // unset preserves the current building; send 0 to unassign.
    optional int64 building_id = 7;
}

// Group-specific metadata for group-type device sets
// Reserved for future group-specific fields (e.g., tags, policies)
message GroupInfo {}

// DeviceSetMember represents a device in a device set
message DeviceSetMember {
    // Device identifier of the member
    string device_identifier = 1;

    // When the device was added to the device set
    google.protobuf.Timestamp added_at = 2;

    // Type-specific member details
    oneof member_details {
        RackMemberDetails rack = 3;
    }
}

// Rack-specific details for a device set member
message RackMemberDetails {
    // Slot position of the device within the rack
    RackSlotPosition slot_position = 1;
}

// Position of a device within a rack
message RackSlotPosition {
    // Row position (0-indexed)
    int32 row = 1 [(buf.validate.field).int32.gte = 0];
    // Column position (0-indexed)
    int32 column = 2 [(buf.validate.field).int32.gte = 0];
}

// Request to create a new device set
message CreateDeviceSetRequest {
    // Type of device set to create (required)
    DeviceSetType type = 1 [(buf.validate.field).enum = {
        defined_only: true
        not_in: [0]  // Must specify group or rack
    }];

    // Label for the device set (required, 1-100 characters)
    string label = 2 [(buf.validate.field) = {
        string: { min_len: 1, max_len: 100 }
        required: true
    }];

    // Optional description (max 500 characters)
    string description = 3 [(buf.validate.field).string.max_len = 500];

    // Type-specific metadata (rack_info required for racks, group_info optional for groups)
    oneof type_details {
        RackInfo rack_info = 4;
        GroupInfo group_info = 5;
    }

    // Optional: devices to add atomically when creating the device set.
    // If provided, devices are added in the same transaction as device set creation.
    optional common.v1.DeviceSelector device_selector = 6;
}

// Response after creating a device set
message CreateDeviceSetResponse {
    // The newly created device set
    DeviceSet device_set = 1;

    // Number of devices added to the device set (0 if no device_selector was provided)
    int32 added_count = 2;
}

// Request to get a device set by ID
message GetDeviceSetRequest {
    // ID of the device set to retrieve
    int64 device_set_id = 1 [(buf.validate.field).int64.gt = 0];
}

// Response containing the requested device set
message GetDeviceSetResponse {
    // The requested device set
    DeviceSet device_set = 1;
}

// Request to update a device set
message UpdateDeviceSetRequest {
    // ID of the device set to update
    int64 device_set_id = 1 [(buf.validate.field).int64.gt = 0];

    // New label (optional, 1-100 characters if provided)
    optional string label = 2 [(buf.validate.field) = {
        ignore: IGNORE_IF_UNPOPULATED
        string: { min_len: 1, max_len: 100 }
    }];

    // New description (optional, max 500 characters if provided).
    // Omit the field to leave unchanged; set to empty string to clear.
    optional string description = 3 [(buf.validate.field) = {
        ignore: IGNORE_IF_UNPOPULATED
        string: { max_len: 500 }
    }];

    // Type-specific metadata updates (only applicable for the device set's type)
    oneof type_details {
        RackInfo rack_info = 4;
        GroupInfo group_info = 5;
    }

    // Optional: atomically replace all device set members with the selected devices.
    common.v1.DeviceSelector device_selector = 6;
}

// Response after updating a device set
message UpdateDeviceSetResponse {
    // The updated device set
    DeviceSet device_set = 1;
}

// Request to delete a device set
message DeleteDeviceSetRequest {
    // ID of the device set to delete
    int64 device_set_id = 1 [(buf.validate.field).int64.gt = 0];
}

// Response after deleting a device set
message DeleteDeviceSetResponse {
    // Empty response - success indicated by gRPC status
}

// Request to list all device sets
message ListDeviceSetsRequest {
    // Filter by device set type (optional, returns all types if unspecified)
    DeviceSetType type = 1 [(buf.validate.field).enum.defined_only = true];

    // Maximum number of device sets to return (0 = server default)
    int32 page_size = 2 [(buf.validate.field).int32.gte = 0];

    // Pagination cursor from a previous response
    string page_token = 3;

    // Sort configuration (defaults to name ascending).
    // Supported fields: SORT_FIELD_NAME, SORT_FIELD_DEVICE_COUNT, SORT_FIELD_ISSUE_COUNT.
    common.v1.SortConfig sort = 4;

    // Filter by device sets containing devices with open errors of these component types.
    // When non-empty, only device sets with at least one device having an open error
    // matching any of the specified component types are returned.
    repeated errors.v1.ComponentType error_component_types = 5;

    // Deprecated: legacy org-wide zone filter. Use zone_keys (field 9)
    // with explicit building_id for building-scoped matching. The
    // server translates non-empty `zones` into wildcard ZoneKeys
    // (building_id = 0) for backward compatibility. Will be removed
    // with the Phase 2 building-picker UI cutover.
    repeated string zones = 6 [deprecated = true];

    // Filter racks by building (acts as OR condition across IDs).
    // Returns racks assigned to ANY of the specified buildings. When
    // combined with include_no_building, racks with building_id IS
    // NULL are also included. When combined with other filters, uses
    // AND logic. Only valid when type is RACK; otherwise returns
    // INVALID_ARGUMENT.
    repeated int64 building_ids = 7;

    // When true, racks with building_id IS NULL are included.
    // Independent of building_ids — set only this to filter the
    // racked-but-no-building bucket alone; set both to combine
    // specific buildings with the no-building bucket. Only valid when
    // type is RACK; otherwise returns INVALID_ARGUMENT.
    bool include_no_building = 8;

    // Filter by zone keys (acts as OR condition across entries). Each
    // entry is a (building_id, zone) pair; building_id=0 matches the
    // zone label across all buildings (wildcard sentinel), otherwise
    // scopes the match to one building. When combined with other
    // filters, uses AND logic. Only valid when type is RACK; otherwise
    // returns INVALID_ARGUMENT.
    repeated common.v1.ZoneKey zone_keys = 9;
}

// Response containing device sets
message ListDeviceSetsResponse {
    // List of device sets ordered by label
    repeated DeviceSet device_sets = 1;

    // Cursor for the next page, empty if no more results
    string next_page_token = 2;

    // Total number of device sets matching the request filters
    int32 total_count = 3;
}

// Request to add devices to a device set.
//
// When the target is a site-stamped rack, the server rewrites
// device.site_id to match the rack for every added device. The affected
// count is returned in site_reassigned_count. Groups are exempt.
message AddDevicesToDeviceSetRequest {
    // ID of the device set to add devices to
    int64 device_set_id = 1 [(buf.validate.field).int64.gt = 0];

    // Devices to add: specific list or all paired devices
    common.v1.DeviceSelector device_selector = 2 [(buf.validate.field).required = true];
}

// Response after adding devices to a device set
message AddDevicesToDeviceSetResponse {
    // ID of the device set devices were added to
    int64 device_set_id = 1;

    // Number of devices successfully added
    // May be less than requested if some devices were already members
    int32 added_count = 2;

    // Number of devices whose site_id was rewritten by the cascade.
    int32 site_reassigned_count = 3;
}

// Request to remove devices from a device set
message RemoveDevicesFromDeviceSetRequest {
    // ID of the device set to remove devices from
    int64 device_set_id = 1 [(buf.validate.field).int64.gt = 0];

    // Devices to remove: specific list or all paired devices
    common.v1.DeviceSelector device_selector = 2 [(buf.validate.field).required = true];
}

// Response after removing devices from a device set
message RemoveDevicesFromDeviceSetResponse {
    // Number of devices successfully removed
    int32 removed_count = 1;
}

// Request to list members of a device set
message ListDeviceSetMembersRequest {
    // ID of the device set to list members for
    int64 device_set_id = 1 [(buf.validate.field).int64.gt = 0];

    // Maximum number of members to return (default: all)
    int32 page_size = 2 [(buf.validate.field).int32.gte = 0];

    // Pagination cursor from a previous response
    string page_token = 3;
}

// Response containing device set members
message ListDeviceSetMembersResponse {
    // List of members ordered by when they were added (newest first)
    repeated DeviceSetMember members = 1;

    // Cursor for the next page, empty if no more results
    string next_page_token = 2;
}

// Request to get device sets for a device
message GetDeviceDeviceSetsRequest {
    // Device identifier to look up
    string device_identifier = 1 [(buf.validate.field).string.min_len = 1];

    // Filter by device set type (optional, returns all types if unspecified)
    DeviceSetType type = 2;
}

// Response containing device sets the device belongs to
message GetDeviceDeviceSetsResponse {
    // Device sets the device belongs to, ordered by label
    repeated DeviceSet device_sets = 1;
}

// Request to set a device's slot position within a rack
message SetRackSlotPositionRequest {
    // ID of the rack device set
    int64 device_set_id = 1 [(buf.validate.field).int64.gt = 0];

    // Device to position
    string device_identifier = 2 [(buf.validate.field).string.min_len = 1];

    // Target slot position
    RackSlotPosition position = 3 [(buf.validate.field).required = true];
}

// Response after setting a rack slot position
message SetRackSlotPositionResponse {
    // ID of the rack device set
    int64 device_set_id = 1;

    // The slot that was set
    RackSlot slot = 2;
}

// Request to clear a device's slot position within a rack
message ClearRackSlotPositionRequest {
    // ID of the rack device set
    int64 device_set_id = 1 [(buf.validate.field).int64.gt = 0];

    // Device to unposition
    string device_identifier = 2 [(buf.validate.field).string.min_len = 1];
}

// Response after clearing a rack slot position
message ClearRackSlotPositionResponse {}

// Request to list all occupied slots in a rack
message GetRackSlotsRequest {
    // ID of the rack device set
    int64 device_set_id = 1 [(buf.validate.field).int64.gt = 0];
}

// Represents a device assigned to a specific slot in a rack
message RackSlot {
    // Device in this slot
    string device_identifier = 1;
    // Slot position within the rack
    RackSlotPosition position = 2;
}

// Response containing all occupied rack slots
message GetRackSlotsResponse {
    // Occupied slots ordered by row then column
    repeated RackSlot slots = 1;
}

// Aggregated telemetry stats for a single device set
message DeviceSetStats {
    // Device set identifier
    int64 device_set_id = 1;
    // Total number of devices in the device set
    int32 device_count = 2;
    // Number of devices with recent telemetry data
    int32 reporting_count = 3;

    // Aggregated telemetry (totals/averages across reporting devices)
    double total_hashrate_ths = 4;
    double avg_efficiency_jth = 5;
    double total_power_kw = 6;
    double min_temperature_c = 7;
    double max_temperature_c = 8;

    // Fleet health state counts (mirrors dashboard FleetHealth buckets)
    int32 hashing_count = 9;       // ACTIVE + no auth issues + no actionable errors
    int32 broken_count = 10;       // ERROR/NEEDS_MINING_POOL/AUTH_NEEDED or has open errors
    int32 offline_count = 11;      // OFFLINE or NULL status
    int32 sleeping_count = 12;     // MAINTENANCE or INACTIVE

    // Per-metric reporting counts (devices that report each specific metric)
    int32 hashrate_reporting_count = 13;
    int32 efficiency_reporting_count = 14;
    int32 power_reporting_count = 15;
    int32 temperature_reporting_count = 16;

    // Component issue counts (number of devices with open errors by component type)
    int32 control_board_issue_count = 17;
    int32 fan_issue_count = 18;
    int32 hash_board_issue_count = 19;
    int32 psu_issue_count = 20;

    // Per-slot device status for rack-type device sets (empty for groups).
    // Contains one entry per row x column position, including empty slots.
    repeated RackSlotStatus slot_statuses = 21;
}

// Request to get aggregated stats for device sets
message GetDeviceSetStatsRequest {
    // Device set IDs to get stats for
    repeated int64 device_set_ids = 1;
}

// Response containing stats for each requested device set
message GetDeviceSetStatsResponse {
    // Stats per device set (one entry per requested device set ID)
    repeated DeviceSetStats stats = 1;
}

// Status of a device in a specific rack slot position
enum SlotDeviceStatus {
    SLOT_DEVICE_STATUS_UNSPECIFIED = 0;
    SLOT_DEVICE_STATUS_EMPTY = 1;
    SLOT_DEVICE_STATUS_HEALTHY = 2;
    SLOT_DEVICE_STATUS_NEEDS_ATTENTION = 3;
    SLOT_DEVICE_STATUS_OFFLINE = 4;
    SLOT_DEVICE_STATUS_SLEEPING = 5;
}

// Status of a single slot in a rack grid
message RackSlotStatus {
    // Row position (0-indexed)
    int32 row = 1;
    // Column position (0-indexed)
    int32 column = 2;
    // Device status for this slot
    SlotDeviceStatus status = 3;
}

// Request to list all distinct rack zones for the organization
message ListRackZonesRequest {}

// Response containing all distinct rack zones in the organization,
// each tagged with the building and site it belongs to so callers
// can distinguish zones with the same name in different buildings.
message ListRackZonesResponse {
    // Distinct zone strings across all racks, sorted alphabetically.
    // Building-scoped variant is exposed via ListRackZoneRefs below.
    repeated string zones = 1;
}

// Request to list all distinct (building_id, zone) tuples for the org.
// Pair the response with ListBuildings to build a Site → Building →
// Zone dropdown.
message ListRackZoneRefsRequest {}

// Response containing all distinct (building_id, zone) pairs in the
// org's racks, with denormalized building and site labels for cheap
// dropdown rendering. Sorted by site_label, then building_label,
// then zone.
message ListRackZoneRefsResponse {
    repeated common.v1.ZoneRef zones = 1;
}

// Request to list all distinct rack types for the organization
message ListRackTypesRequest {}

// A rack type defined by its row/column dimensions and how many racks use it
message RackType {
    // Number of rows
    int32 rows = 1;
    // Number of columns
    int32 columns = 2;
    // Number of racks using this layout
    int32 rack_count = 3;
}

// Response containing all distinct rack types
message ListRackTypesResponse {
    // Distinct rack types ordered by most recently created rack using that layout
    repeated RackType rack_types = 1;
}

// Request to atomically create or update a rack with membership and slot assignments.
//
// When the rack's site_id changes (directly or via building_id), the
// server rewrites device.site_id for every member to match. The affected
// count is returned in site_reassigned_count.
message SaveRackRequest {
    // ID of an existing rack to update. Omit to create a new rack.
    optional int64 device_set_id = 1 [(buf.validate.field) = {
        ignore: IGNORE_IF_UNPOPULATED
        int64: { gt: 0 }
    }];

    // Label for the rack (required, 1-100 characters)
    string label = 2 [(buf.validate.field) = {
        string: { min_len: 1, max_len: 100 }
        required: true
    }];

    // Rack-specific metadata (required)
    RackInfo rack_info = 3 [(buf.validate.field).required = true];

    // Devices that should be members of this rack.
    // Replaces all existing members atomically.
    common.v1.DeviceSelector device_selector = 4 [(buf.validate.field).required = true];

    // Slot assignments for devices within the rack.
    // Only devices included in device_selector may be assigned slots.
    // Devices not listed here will be members without a slot position.
    repeated RackSlot slot_assignments = 5;
}

// Response after saving a rack.
message SaveRackResponse {
    // The created or updated rack device set
    DeviceSet device_set = 1;

    // Number of slot positions assigned
    int32 assigned_count = 2;

    // Number of devices whose site_id was rewritten by the cascade.
    int32 site_reassigned_count = 3;
}
