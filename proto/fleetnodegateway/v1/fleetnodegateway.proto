syntax = "proto3";

// Wire protocol between an on-prem fleet node and a cloud fleetd --mode=server.
// All streams are node-initiated; post-handshake RPCs carry the session token
// in `Authorization: Bearer <session_token>` metadata, and server handlers
// derive the effective fleet-node identity from that token rather than any
// body field. See docs/rfcs/0001-agent-server-split.md.
package fleetnodegateway.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

service FleetNodeGatewayService {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc BeginAuthHandshake(BeginAuthHandshakeRequest) returns (BeginAuthHandshakeResponse);
    rpc CompleteAuthHandshake(CompleteAuthHandshakeRequest) returns (CompleteAuthHandshakeResponse);
    rpc UploadTelemetry(stream UploadTelemetryRequest) returns (UploadTelemetryResponse);
    rpc UploadEvents(stream UploadEventsRequest) returns (UploadEventsResponse);
    rpc UploadHeartbeat(UploadHeartbeatRequest) returns (UploadHeartbeatResponse);
    rpc ReportDiscoveredDevices(ReportDiscoveredDevicesRequest) returns (ReportDiscoveredDevicesResponse);
    rpc ReportPairedDevices(ReportPairedDevicesRequest) returns (ReportPairedDevicesResponse);
    rpc ControlStream(stream ControlStreamRequest) returns (stream ControlStreamResponse);
}

enum EnrollmentStatus {
    ENROLLMENT_STATUS_UNSPECIFIED = 0;
    ENROLLMENT_STATUS_PENDING     = 1;
    ENROLLMENT_STATUS_CONFIRMED   = 2;
    ENROLLMENT_STATUS_REVOKED     = 3;
}

message RegisterRequest {
    // Single-use, org-scoped token issued by an operator; pins the fleet node's tenant.
    string enrollment_token     = 1 [(buf.validate.field).string = {min_len: 20, max_len: 512}];
    string name                 = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    bytes  identity_pubkey      = 3 [(buf.validate.field).bytes.len = 32];
    bytes  miner_signing_pubkey = 4 [(buf.validate.field).bytes.len = 32];
}

message RegisterResponse {
    int64 fleet_node_id = 1;
    EnrollmentStatus enrollment_status = 2;
    string identity_fingerprint = 3;
}

message BeginAuthHandshakeRequest {
    string api_key         = 1 [(buf.validate.field).string = {min_len: 20, max_len: 512}];
    bytes  identity_pubkey = 2 [(buf.validate.field).bytes.len = 32];
}

message BeginAuthHandshakeResponse {
    bytes challenge = 1;
    google.protobuf.Timestamp expires_at = 2;
}

message CompleteAuthHandshakeRequest {
    bytes challenge = 1 [(buf.validate.field).bytes = {min_len: 16, max_len: 64}];
    bytes signature = 2 [(buf.validate.field).bytes.len = 64];
}

message CompleteAuthHandshakeResponse {
    string session_token = 1;
    google.protobuf.Timestamp expires_at = 2;
}

message UploadTelemetryRequest {
    bytes payload                        = 1 [(buf.validate.field).bytes.max_len = 1048576];
    google.protobuf.Timestamp captured_at = 2 [(buf.validate.field).required = true];
}

message UploadTelemetryResponse {
    int64 accepted_count = 1;
}

message UploadEventsRequest {
    bytes payload                        = 1 [(buf.validate.field).bytes.max_len = 1048576];
    google.protobuf.Timestamp captured_at = 2 [(buf.validate.field).required = true];
}

message UploadEventsResponse {
    int64 accepted_count = 1;
}

message UploadHeartbeatRequest {
    google.protobuf.Timestamp sent_at = 1 [(buf.validate.field).required = true];
}

message UploadHeartbeatResponse {
    google.protobuf.Timestamp received_at = 1;
}

message ReportDiscoveredDevicesRequest {
    repeated DiscoveredDeviceReport devices = 1
        [(buf.validate.field).repeated.max_items = 1024];
    // Echoes the command_id of the ControlCommand that scheduled the
    // scan. Required: the gateway only accepts reports in response to
    // a server-issued command and uses this to route the batch to the
    // operator stream waiting on DiscoverOnFleetNode.
    string command_id = 2 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
}

message DiscoveredDeviceReport {
    string device_identifier = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    string ip_address        = 2 [(buf.validate.field).string = {min_len: 1, max_len: 45, ip: true}];
    string port              = 3 [
        (buf.validate.field).string = {min_len: 1, max_len: 5},
        (buf.validate.field).cel = {
            id: "port.range",
            message: "port must be a decimal number in 1..65535",
            expression: "this.matches('^[1-9][0-9]*$') && int(this) <= 65535"
        }
    ];
    // No {in: [...]} restriction here: plugins may report non-http schemes
    // (e.g., the virtual driver uses "virtual") and the pairing.Device proto
    // accepts any string, so the gateway should not be stricter than the
    // source schema. max_len keeps the field bounded.
    string url_scheme       = 4 [(buf.validate.field).string.max_len = 32];
    string driver_name      = 5 [(buf.validate.field).string = {min_len: 1, max_len: 50}];
    string model            = 6 [(buf.validate.field).string.max_len = 255];
    string manufacturer     = 7 [(buf.validate.field).string.max_len = 255];
    string firmware_version = 8 [(buf.validate.field).string.max_len = 255];
}

message ReportDiscoveredDevicesResponse {
    int64 accepted_count = 1;
    // Reports the server refused to persist because the device is already
    // paired with a different fleet_node. Operators see these as "the
    // agent reported something it doesn't own."
    int64 rejected_count = 2;
}

// PairOutcome is the per-device result of a pairing attempt on the node.
enum PairOutcome {
    PAIR_OUTCOME_UNSPECIFIED = 0;
    PAIR_OUTCOME_PAIRED      = 1;
    // AUTH_NEEDED: credentials were required but missing (or default creds failed).
    PAIR_OUTCOME_AUTH_NEEDED = 2;
    // AUTH_FAILED: credentials were supplied but rejected by the miner.
    PAIR_OUTCOME_AUTH_FAILED = 3;
    // ERROR: pairing failed for a non-auth reason (unreachable, plugin error).
    PAIR_OUTCOME_ERROR       = 4;
}

message FleetNodePairResult {
    string device_identifier = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    PairOutcome outcome      = 2;
    // Identity learned during pairing; populated on PAIRED.
    string serial_number     = 3 [(buf.validate.field).string.max_len = 255];
    string mac_address       = 4 [(buf.validate.field).string.max_len = 64];
    string model             = 5 [(buf.validate.field).string.max_len = 255];
    string manufacturer      = 6 [(buf.validate.field).string.max_len = 255];
    string firmware_version  = 7 [(buf.validate.field).string.max_len = 255];
    string error_message     = 8 [(buf.validate.field).string.max_len = 4096];

    // Flat scalars couldn't distinguish a basic-auth credential with an empty
    // username/password from an absent one, so a successful empty-credential
    // pairing was persisted with no auth material. Replaced by used_credentials,
    // whose message presence carries that distinction.
    reserved 9, 10;
    reserved "used_username", "used_password";

    // The credentials the node authenticated with. Set for basic-auth drivers
    // (operator-supplied OR plugin defaults) and absent for asymmetric-auth
    // drivers, which pair with the node's signing key and carry no credentials.
    // Presence is meaningful: a present message -- even with an empty username or
    // password -- means the cloud must persist it as the device's auth material;
    // absent means store nothing.
    UsedCredentials used_credentials = 11;
}

// UsedCredentials carries the basic-auth credentials a node authenticated with,
// echoed so the cloud can persist working auth material for the device. Capped to
// bound the ReportPairedDevices payload. The node refuses to pair (reports ERROR)
// rather than authenticate with a credential it cannot report within these caps.
message UsedCredentials {
    string username = 1 [(buf.validate.field).string.max_len = 255];
    string password = 2 [(buf.validate.field).string.max_len = 1024];
}

message ReportPairedDevicesRequest {
    // Echoes the command_id of the ControlCommand that scheduled the pairing,
    // so the gateway routes the batch to the operator stream waiting on
    // PairDiscoveredDevicesOnFleetNode.
    string command_id = 1 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
    repeated FleetNodePairResult results = 2 [(buf.validate.field).repeated.max_items = 1024];
}

message ReportPairedDevicesResponse {
    int64 accepted_count = 1;
    int64 rejected_count = 2;
}

message ControlStreamRequest {
    oneof kind {
        option (buf.validate.oneof).required = true;

        ControlHello hello = 1;
        ControlAck   ack   = 2;
    }
}

message ControlStreamResponse {
    oneof kind {
        option (buf.validate.oneof).required = true;

        ControlAccepted accepted = 1;
        ControlCommand  command  = 2;
    }
}

message ControlHello {}

message ControlAccepted {
    google.protobuf.Timestamp server_time = 1;
}

message ControlCommand {
    string command_id = 1 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
    bytes  payload    = 2 [(buf.validate.field).bytes.max_len = 1048576];
}

message ControlAck {
    string command_id    = 1 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
    bool   succeeded     = 2;
    string error_message = 3 [(buf.validate.field).string.max_len = 4096];
    AckCode code         = 4;
}

// AckCode is the structured outcome class for a ControlCommand. error_message
// carries the precise human-readable reason. Codes route on consumer-visible
// distinctions only (e.g., retry on different node for AGENT_INCAPABLE;
// surface partial results for PARTIAL).
enum AckCode {
    ACK_CODE_UNSPECIFIED     = 0;
    ACK_CODE_OK              = 1;
    // PARTIAL: scan completed partially after commandTimeout; reports already uploaded.
    ACK_CODE_PARTIAL         = 2;
    // BAD_REQUEST: malformed payload, missing/invalid mode, invalid targets/ports, limits exceeded.
    ACK_CODE_BAD_REQUEST     = 3;
    // AGENT_INCAPABLE: this agent cannot execute the requested mode (mdns, nmap missing). Retry on a different node.
    ACK_CODE_AGENT_INCAPABLE = 4;
    // SCAN_FAILED: scanning machinery errored (nmap subprocess, etc.).
    ACK_CODE_SCAN_FAILED     = 5;
    // REPORT_FAILED: scan finished, report upload to the server failed.
    ACK_CODE_REPORT_FAILED   = 6;
    ACK_CODE_INTERNAL        = 7;
    // BUSY: agent already has a command in flight; safe to retry shortly.
    ACK_CODE_BUSY            = 8;
}
