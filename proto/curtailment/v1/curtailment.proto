syntax = "proto3";

package curtailment.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "buf/validate/validate.proto";

// Service for previewing, starting, tracking, and stopping curtailment events.
service CurtailmentService {
    // Preview a candidate plan without persisting it.
    rpc PreviewCurtailmentPlan(PreviewCurtailmentPlanRequest)
        returns (PreviewCurtailmentPlanResponse);

    // Start an event, persist targets, and dispatch initial Curtail
    // commands. Multiple events can be active per org when they target
    // disjoint device scopes; AlreadyExists means a selected device is
    // already in a non-terminal curtailment (retry against the remainder).
    rpc StartCurtailment(StartCurtailmentRequest)
        returns (StartCurtailmentResponse);

    // Update operator-safe fields; target mutation is reserved.
    rpc UpdateCurtailmentEvent(UpdateCurtailmentEventRequest)
        returns (UpdateCurtailmentEventResponse);

    // Stop an active event and begin staggered restore. Idempotent on
    // already-restoring; FailedPrecondition on terminal events (non-retryable).
    rpc StopCurtailment(StopCurtailmentRequest)
        returns (StopCurtailmentResponse);

    // Get the most-recent pending, active, or restoring event.
    rpc GetActiveCurtailment(GetActiveCurtailmentRequest)
        returns (GetActiveCurtailmentResponse);

    // List every active (pending/active/restoring) event for the org.
    // Multiple can be active at once when scoped to disjoint device sets.
    rpc ListActiveCurtailments(ListActiveCurtailmentsRequest)
        returns (ListActiveCurtailmentsResponse);

    // List historical events with cursor pagination.
    rpc ListCurtailmentEvents(ListCurtailmentEventsRequest)
        returns (ListCurtailmentEventsResponse);

    // Get one historical or active event with full per-target cycle detail.
    rpc GetCurtailmentEvent(GetCurtailmentEventRequest)
        returns (GetCurtailmentEventResponse);

    // Admin recovery RPC: force a non-terminal event to a terminal state.
    // Session-only, Admin role; reason required (min_len=1, max_len=256).
    //
    // FailedPrecondition variants ride on FleetErrorDetails.service (see
    // common/v1/common.proto) so machine callers branch on the int32 code:
    //   - 1 (AdminTerminateInFlightCommands): a target still has an
    //     in-flight Curtail (desired_state=CURTAILED). Recoverable via
    //     StopCurtailment first.
    //   - 2 (AdminTerminateStateConflict): event already settled in a
    //     different terminal state. Not retryable.
    //
    // RESTORING-event semantics: the in-flight gate matches only
    // desired_state=CURTAILED, so a terminate during restore proceeds
    // even when Uncurtails are in flight. Race-window targets persist as
    // RESTORE_FAILED while the device may actually be restored.
    rpc AdminTerminateEvent(AdminTerminateEventRequest)
        returns (AdminTerminateEventResponse);

    // IngestCurtailmentSignal starts a curtailment event from an
    // external dispatch signal. signal_payload is provider-opaque;
    // per-provider adapters decode it. Idempotent on
    // (org_id, external_source, external_reference): replay during
    // an in-flight event echoes, post-terminal fires fresh.
    rpc IngestCurtailmentSignal(IngestCurtailmentSignalRequest)
        returns (IngestCurtailmentSignalResponse);

    // MQTT curtailment source settings. These RPCs manage broker
    // configuration and source runtime state only. Binding a source to a
    // response profile is handled by automation.
    rpc ListMqttCurtailmentSources(ListMqttCurtailmentSourcesRequest)
        returns (ListMqttCurtailmentSourcesResponse);
    rpc GetMqttCurtailmentSource(GetMqttCurtailmentSourceRequest)
        returns (GetMqttCurtailmentSourceResponse);
    rpc CreateMqttCurtailmentSource(CreateMqttCurtailmentSourceRequest)
        returns (CreateMqttCurtailmentSourceResponse);
    rpc UpdateMqttCurtailmentSource(UpdateMqttCurtailmentSourceRequest)
        returns (UpdateMqttCurtailmentSourceResponse);
    rpc TestMqttCurtailmentSourceConnection(TestMqttCurtailmentSourceConnectionRequest)
        returns (TestMqttCurtailmentSourceConnectionResponse);
    rpc SetMqttCurtailmentSourceEnabled(SetMqttCurtailmentSourceEnabledRequest)
        returns (SetMqttCurtailmentSourceEnabledResponse);
    rpc DeleteMqttCurtailmentSource(DeleteMqttCurtailmentSourceRequest)
        returns (DeleteMqttCurtailmentSourceResponse);
}

// --- Enums ---

// CurtailmentMode selects the target-set algorithm.
enum CurtailmentMode {
    CURTAILMENT_MODE_UNSPECIFIED = 0;

    // Open-loop, operator-sized; targets are frozen at event creation.
    CURTAILMENT_MODE_FIXED_KW         = 1;  // v1: select until sum(power_w) >= target_kw
    CURTAILMENT_MODE_FIXED_COUNT      = 2;  // reserved: explicit miner count

    // Open-loop, externally triggered; targets are frozen once selected.
    CURTAILMENT_MODE_DEMAND_RESPONSE  = 3;  // reserved (v2)

    // Closed-loop modes re-evaluate targets against a signal or setpoint.
    CURTAILMENT_MODE_SITE_POWER_CAP   = 4;  // reserved (v3)
    CURTAILMENT_MODE_THERMAL_LIMIT    = 5;  // reserved (v3)
    CURTAILMENT_MODE_PRICE_BREAKEVEN  = 6;  // reserved (v3)
    CURTAILMENT_MODE_POWER_TRAJECTORY = 7;  // reserved (v3)

    // Open-loop: curtail every eligible candidate in the selected scope (no kW
    // target), frozen at creation. Whole-org scope = whole fleet; a site /
    // device-list scope = that site.
    CURTAILMENT_MODE_FULL_FLEET       = 8;
}

// CurtailmentStrategy selects candidate ranking.
enum CurtailmentStrategy {
    CURTAILMENT_STRATEGY_UNSPECIFIED            = 0;

    // Economic ranking by per-miner attributes.
    CURTAILMENT_STRATEGY_LEAST_EFFICIENT_FIRST  = 1;  // v1 default: worst J/TH first
    CURTAILMENT_STRATEGY_MOST_POWER_FIRST       = 2;  // reserved: biggest single-miner shed first
    CURTAILMENT_STRATEGY_OLDEST_HARDWARE_FIRST  = 3;  // reserved: oldest gear first

    // Reliability ranking by stability heuristics.
    CURTAILMENT_STRATEGY_UNSTABLE_MINERS_FIRST  = 4;  // reserved: restart-risk tolerant first

    // Topology-aware placement constraints.
    CURTAILMENT_STRATEGY_RACK_GRANULAR          = 5;  // reserved: distribute across racks/PDUs
}

// CurtailmentLevel is ordered by ascending per-miner power reduction.
enum CurtailmentLevel {
    CURTAILMENT_LEVEL_UNSPECIFIED     = 0;
    CURTAILMENT_LEVEL_EFFICIENCY      = 1;  // reserved (v4): peak J/TH setting
    CURTAILMENT_LEVEL_FULL            = 2;  // v1: complete shutdown
}

// CurtailmentPriority controls cooldown and hysteresis behavior.
enum CurtailmentPriority {
    CURTAILMENT_PRIORITY_UNSPECIFIED = 0;
    CURTAILMENT_PRIORITY_NORMAL      = 1;  // default; respects hysteresis and cooldowns
    CURTAILMENT_PRIORITY_HIGH        = 2;
    // EMERGENCY bypasses cooldown/min-duration, but not maintenance checks.
    CURTAILMENT_PRIORITY_EMERGENCY   = 3;
}

// CurtailmentEventState tracks one event lifecycle.
enum CurtailmentEventState {
    CURTAILMENT_EVENT_STATE_UNSPECIFIED              = 0;

    // In-flight states.
    CURTAILMENT_EVENT_STATE_PENDING                  = 1;
    CURTAILMENT_EVENT_STATE_ACTIVE                   = 2;
    CURTAILMENT_EVENT_STATE_RESTORING                = 3;

    // Terminal outcomes.
    CURTAILMENT_EVENT_STATE_COMPLETED                = 4;  // every target resolved cleanly
    CURTAILMENT_EVENT_STATE_COMPLETED_WITH_FAILURES  = 5;  // some targets RESTORE_FAILED
    CURTAILMENT_EVENT_STATE_CANCELLED                = 6;  // user-initiated termination
    CURTAILMENT_EVENT_STATE_FAILED                   = 7;  // system-initiated termination
}

// CurtailmentTargetState tracks one target inside an event.
enum CurtailmentTargetState {
    CURTAILMENT_TARGET_STATE_UNSPECIFIED    = 0;

    // In-flight states; CONFIRMED can drift and be re-dispatched.
    CURTAILMENT_TARGET_STATE_PENDING        = 1;
    // Pre-command transient. AdminTerminate's in-flight gate observes
    // DISPATCHING rows and rejects as Stop-first.
    CURTAILMENT_TARGET_STATE_DISPATCHING    = 8;
    CURTAILMENT_TARGET_STATE_DISPATCHED     = 2;
    CURTAILMENT_TARGET_STATE_CONFIRMED      = 3;
    CURTAILMENT_TARGET_STATE_DRIFTED        = 4;  // re-dispatching

    // Terminal outcomes.
    CURTAILMENT_TARGET_STATE_RESOLVED       = 5;  // event ended cleanly for this target
    CURTAILMENT_TARGET_STATE_RELEASED       = 6;  // removed by closed-loop mid-event (v3+); ends target, not event
    CURTAILMENT_TARGET_STATE_RESTORE_FAILED = 7;  // unreachable after restore was attempted
}

// CurtailmentTargetDesiredState is the reconciler target state.
enum CurtailmentTargetDesiredState {
    CURTAILMENT_TARGET_DESIRED_STATE_UNSPECIFIED = 0;
    CURTAILMENT_TARGET_DESIRED_STATE_CURTAILED   = 1;
    CURTAILMENT_TARGET_DESIRED_STATE_ACTIVE      = 2;
}

// CurtailmentTargetPhase identifies a durable per-target phase summary.
enum CurtailmentTargetPhase {
    CURTAILMENT_TARGET_PHASE_UNSPECIFIED = 0;
    CURTAILMENT_TARGET_PHASE_CURTAIL     = 1;
    CURTAILMENT_TARGET_PHASE_RESTORE     = 2;
}

// --- Scope wrappers ---

// ScopeWholeOrg selects every miner in the caller organization.
message ScopeWholeOrg {}

// ScopeDeviceSets selects miners in device sets.
message ScopeDeviceSets {
    repeated string device_set_ids = 1 [(buf.validate.field).repeated = {
        min_items: 1
        items: { string: { min_len: 1 } }
    }];
}

// ScopeDeviceList selects explicit device identifiers.
message ScopeDeviceList {
    repeated string device_identifiers = 1 [(buf.validate.field).repeated = {
        min_items: 1
        items: { string: { min_len: 1 } }
    }];
}

// --- Mode parameter messages ---

// FixedKwParams configures a fixed-kW reduction target.
message FixedKwParams {
    // Target kW reduction.
    double target_kw = 1 [(buf.validate.field).double.gt = 0];

    // Optional accepted undershoot; absent or 0 is strict.
    optional double tolerance_kw = 2 [(buf.validate.field).double.gte = 0];
}

// FixedCountParams is reserved for FIXED_COUNT.
message FixedCountParams {
    int32 count = 1;
}

// SitePowerCapParams is reserved for SITE_POWER_CAP.
message SitePowerCapParams {
    double cap_kw = 1;
}

// FullFleetParams configures FULL_FLEET (curtail every eligible candidate in
// scope). Empty today; reserved for future toggles (e.g. also targeting
// idle / sub-threshold miners).
message FullFleetParams {}

// --- Domain messages ---

// CurtailmentEvent is the full event returned by Get/List/Start RPCs.
message CurtailmentEvent {
    // Stable external event identifier.
    string event_uuid = 1;

    CurtailmentEventState state    = 2;
    CurtailmentMode       mode     = 3;
    CurtailmentStrategy   strategy = 4;
    CurtailmentLevel      level    = 5;
    CurtailmentPriority   priority = 6;

    // Original request scope and mode params.
    oneof scope {
        ScopeWholeOrg   whole_org           = 7;
        ScopeDeviceSets device_set_ids      = 8;
        ScopeDeviceList device_identifiers  = 9;
        ScopeSite       site                = 25;
    }
    oneof mode_params {
        FixedKwParams      fixed_kw       = 10;
        FixedCountParams   fixed_count    = 11;
        SitePowerCapParams site_power_cap = 12;
        FullFleetParams    full_fleet     = 13;
    }

    // Original operational controls.
    uint32 max_duration_seconds       = 14;
    uint32 restore_batch_size         = 15;
    uint32 restore_batch_interval_sec = 16;
    uint32 min_curtailed_duration_sec = 17;
    bool   include_maintenance        = 18;
    bool   force_include_maintenance  = 19;

    // Server-resolved batch size stamped at Start as
    // max(restore_batch_size, ceil(0.01 × selected_target_count))
    // clamped to [10, 100]. Clients display this; restorer reads it.
    uint32 effective_batch_size = 24;

    // Operator-supplied reason.
    string reason = 20;

    // Trigger attribution; empty for direct user/API-key calls.
    string external_source    = 21;
    string external_reference = 22;
    string idempotency_key    = 23;

    // scheduled_start_at is null for "start now" events.
    google.protobuf.Timestamp scheduled_start_at = 30;
    google.protobuf.Timestamp started_at         = 31;
    google.protobuf.Timestamp ended_at           = 32;
    google.protobuf.Timestamp created_at         = 33;
    google.protobuf.Timestamp updated_at         = 34;

    // Per-state target counts for summaries.
    CurtailmentTargetRollup target_rollup = 40;

    // Full target details.
    repeated CurtailmentTarget targets = 41;

    // Extensible selector decision snapshot.
    google.protobuf.Struct decision_snapshot = 42;
}

// CurtailmentTargetRollup summarizes target states.
message CurtailmentTargetRollup {
    int32 pending        = 1;
    int32 dispatched     = 2;
    int32 confirmed      = 3;
    int32 drifted        = 4;
    int32 resolved       = 5;
    int32 released       = 6;
    int32 restore_failed = 7;
    int32 total          = 8;
}

// CurtailmentTarget is one event-scoped target.
message CurtailmentTarget {
    string device_identifier = 1;
    string target_type       = 2;  // v1: "miner"; future: "pdu", "pdu_outlet", "rack"

    CurtailmentTargetState        state         = 3;
    CurtailmentTargetDesiredState desired_state = 4;

    optional double baseline_power_w = 5;
    optional double observed_power_w = 6;

    google.protobuf.Timestamp added_at           = 7;
    google.protobuf.Timestamp released_at        = 8;
    google.protobuf.Timestamp last_dispatched_at = 9;
    string                    last_batch_uuid    = 10;
    google.protobuf.Timestamp observed_at        = 11;
    google.protobuf.Timestamp confirmed_at       = 12;

    uint32 retry_count = 13;
    string last_error  = 14;

    // Durable phase summaries preserve the curtail and restore outcomes even
    // when the rolling state/cursor fields above are reset between phases.
    CurtailmentTargetPhaseSummary curtail_phase = 20;
    CurtailmentTargetPhaseSummary restore_phase = 21;
}

// CurtailmentTargetPhaseSummary is the compact per-miner cycle record used by
// historical detail views. failure_count counts dispatch/confirm failures for
// the phase; last_error is retained even if a later retry succeeds.
message CurtailmentTargetPhaseSummary {
    CurtailmentTargetPhase phase = 1;
    CurtailmentTargetState state = 2;

    google.protobuf.Timestamp started_at    = 3;
    google.protobuf.Timestamp dispatched_at = 4;
    string                    batch_uuid    = 5;
    google.protobuf.Timestamp completed_at  = 6;

    uint32 retry_count   = 7;
    uint32 failure_count = 8;
    string last_error    = 9;
}

// CurtailmentCandidate is one selected preview candidate.
message CurtailmentCandidate {
    string device_identifier = 1;
    double current_power_w   = 2;
    double efficiency_jh     = 3;
    string reason_selected   = 4;  // human-readable selection rationale
}

// SkippedCandidate explains why a candidate was excluded.
message SkippedCandidate {
    string device_identifier = 1;
    string reason            = 2;  // canonical exclusion reason (e.g. "phantom_load_no_hash")
    string description       = 3;  // human-readable elaboration
}

// --- Requests / Responses ---

// PreviewCurtailmentPlan

message PreviewCurtailmentPlanRequest {
    // Keep these CEL validators in sync with supported v1 request shapes.
    option (buf.validate.message).cel = {
        id: "scope_required"
        message: "exactly one scope must be set"
        expression: "has(this.whole_org) || has(this.device_set_ids) || has(this.device_identifiers) || has(this.site)"
    };
    option (buf.validate.message).cel = {
        id: "mode_params_match_mode"
        message: "mode_params must match mode (FIXED_KW=1 -> fixed_kw; FULL_FLEET=8 -> none)"
        expression: "(this.mode == 1 && has(this.fixed_kw)) || (this.mode == 8 && !has(this.fixed_kw) && !has(this.fixed_count) && !has(this.site_power_cap))"
    };
    option (buf.validate.message).cel = {
        id: "maintenance_force_required"
        message: "include_maintenance and force_include_maintenance must be set together"
        expression: "this.include_maintenance == this.force_include_maintenance"
    };

    oneof scope {
        ScopeWholeOrg   whole_org           = 1;
        ScopeDeviceSets device_set_ids      = 2;
        ScopeDeviceList device_identifiers  = 3;
        ScopeSite       site                = 27;
    }

    CurtailmentMode     mode     = 4 [(buf.validate.field).enum = {
        defined_only: true
        // v1 supports FIXED_KW and FULL_FLEET.
        in: [1, 8]
    }];
    // 0 = use server default (LEAST_EFFICIENT_FIRST).
    CurtailmentStrategy strategy = 5 [(buf.validate.field).enum = {
        defined_only: true
        // v1 supports LEAST_EFFICIENT_FIRST.
        in: [0, 1]
    }];
    // 0 = use server default (FULL).
    CurtailmentLevel    level    = 6 [(buf.validate.field).enum = {
        defined_only: true
        // v1 supports FULL.
        in: [0, 2]
    }];
    // 0 = server default. HIGH is reserved.
    CurtailmentPriority priority = 7 [(buf.validate.field).enum = {
        defined_only: true
        in: [0, 1, 3]
    }];

    oneof mode_params {
        FixedKwParams        fixed_kw         = 8;
        FixedCountParams     fixed_count      = 9;
        SitePowerCapParams   site_power_cap   = 10;
    }

    bool include_maintenance       = 24;
    bool force_include_maintenance = 25;

    // Admin-only override of the per-org `candidate_min_power_w` default.
    // Upper bound is a sanity ceiling (10 MW per miner); zero means "use default" so it is excluded.
    optional uint32 candidate_min_power_w_override = 26 [(buf.validate.field).uint32 = {gte: 1, lte: 10000000}];

    reserved 11 to 23;
}

message PreviewCurtailmentPlanResponse {
    // Selected miners in dispatch order.
    repeated CurtailmentCandidate candidates = 1;

    // Realized kW from selected miners.
    double estimated_reduction_kw = 2;

    // Remaining non-selected candidate power.
    double estimated_remaining_power_kw = 3;

    // Echoes request mode params for UI deltas.
    CurtailmentMode mode = 4;
    oneof mode_params {
        FixedKwParams      fixed_kw       = 5;
        FixedCountParams   fixed_count    = 6;
        SitePowerCapParams site_power_cap = 7;
    }

    // Excluded candidates with canonical reasons.
    repeated SkippedCandidate skipped_candidates = 20;
}

// StartCurtailment

message StartCurtailmentRequest {
    // Keep these CEL validators in sync with supported v1 request shapes.
    option (buf.validate.message).cel = {
        id: "scope_required"
        message: "exactly one scope must be set"
        expression: "has(this.whole_org) || has(this.device_set_ids) || has(this.device_identifiers) || has(this.site)"
    };
    option (buf.validate.message).cel = {
        id: "mode_params_match_mode"
        message: "mode_params must match mode (FIXED_KW=1 -> fixed_kw; FULL_FLEET=8 -> none)"
        expression: "(this.mode == 1 && has(this.fixed_kw)) || (this.mode == 8 && !has(this.fixed_kw) && !has(this.fixed_count) && !has(this.site_power_cap))"
    };
    option (buf.validate.message).cel = {
        id: "maintenance_force_required"
        message: "include_maintenance and force_include_maintenance must be set together"
        expression: "this.include_maintenance == this.force_include_maintenance"
    };

    oneof scope {
        ScopeWholeOrg   whole_org           = 1;
        ScopeDeviceSets device_set_ids      = 2;
        ScopeDeviceList device_identifiers  = 3;
        ScopeSite       site                = 28;
    }

    CurtailmentMode     mode     = 4 [(buf.validate.field).enum = {
        defined_only: true
        in: [1, 8]
    }];
    // 0 = use server default (LEAST_EFFICIENT_FIRST).
    CurtailmentStrategy strategy = 5 [(buf.validate.field).enum = {
        defined_only: true
        in: [0, 1]
    }];
    // 0 = use server default (FULL).
    CurtailmentLevel    level    = 6 [(buf.validate.field).enum = {
        defined_only: true
        in: [0, 2]
    }];
    CurtailmentPriority priority = 7 [(buf.validate.field).enum = {
        defined_only: true
        in: [0, 1, 3]
    }];

    oneof mode_params {
        FixedKwParams        fixed_kw         = 8;
        FixedCountParams     fixed_count      = 9;
        SitePowerCapParams   site_power_cap   = 10;
    }

    // Operational controls.
    uint32 max_duration_seconds       = 20 [(buf.validate.field).uint32 = {lte: 604800}];  // 0 = no cap
    // 0 = server default. Persisted as the per-event preferred batch size;
    // the adaptive [10, 100] envelope is applied by the server at restore time.
    uint32 restore_batch_size         = 21 [(buf.validate.field).uint32 = {lte: 10000}];
    uint32 restore_batch_interval_sec = 22 [(buf.validate.field).uint32 = {lte: 3600}];  // 0 = server default
    uint32 min_curtailed_duration_sec = 23;

    // include_maintenance requires force_include_maintenance.
    bool include_maintenance       = 24;
    bool force_include_maintenance = 25;

    // Admin-only override of the per-org `candidate_min_power_w` default.
    // Upper bound is a sanity ceiling (10 MW per miner); zero means "use default" so it is excluded.
    optional uint32 candidate_min_power_w_override = 26 [(buf.validate.field).uint32 = {gte: 1, lte: 10000000}];

    // Admin-only acknowledgement to opt out of `max_duration_default_sec`
    // normalization. Default false; otherwise `max_duration_seconds=0` is
    // normalized to the per-org default at handler entry.
    bool allow_unbounded = 27;

    // Idempotency and trigger attribution. max_len=256 matches DB varchar.
    string idempotency_key    = 30 [(buf.validate.field).string.max_len = 256];  // unique per (org, key) when non-empty
    string reason             = 31 [(buf.validate.field).string = {min_len: 1, max_len: 256}];
    string external_source    = 32 [(buf.validate.field).string.max_len = 256];  // webhook source name
    string external_reference = 33 [(buf.validate.field).string.max_len = 256];  // upstream event ID
}

message StartCurtailmentResponse {
    CurtailmentEvent event = 1;
}

// UpdateCurtailmentEvent supports operator-safe field updates. Optional
// fields allow partial updates; bounds mirror StartCurtailmentRequest so
// the same value rejected at Start cannot tunnel in via Update.
message UpdateCurtailmentEventRequest {
    string event_uuid = 1 [(buf.validate.field).string.min_len = 1];

    optional string reason                     = 10 [(buf.validate.field).string = {min_len: 1, max_len: 256}];
    optional uint32 restore_batch_size         = 11 [(buf.validate.field).uint32 = {lte: 10000}];
    optional uint32 restore_batch_interval_sec = 12 [(buf.validate.field).uint32 = {lte: 3600}];
    optional uint32 max_duration_seconds       = 13 [(buf.validate.field).uint32 = {lte: 604800}];
}

message UpdateCurtailmentEventResponse {
    CurtailmentEvent event = 1;
}

// StopCurtailment starts restore; min duration may block normal priority.
message StopCurtailmentRequest {
    // Tag 2 / name was an early `restore_batch_size_override`; reserve
    // both so an old client's payload can't alias to `force=true`.
    reserved 2;
    reserved "restore_batch_size_override";

    string event_uuid = 1 [(buf.validate.field).string.min_len = 1];

    // Admin-gated bypass of `min_curtailed_duration_sec`.
    bool force = 3;
}

message StopCurtailmentResponse {
    CurtailmentEvent event = 1;
}

// GetActiveCurtailment returns the caller's active event, if any.
message GetActiveCurtailmentRequest {}

message GetActiveCurtailmentResponse {
    // The most-recent pending/active/restoring event, or empty when none.
    // Multiple events can be active per org (one per disjoint device scope);
    // use ListActiveCurtailments to enumerate them all.
    optional CurtailmentEvent event = 1;
}

// ListActiveCurtailments returns every non-terminal event for the caller's
// org. Multiple can be active when they target disjoint device scopes (e.g.
// one per site). Each event carries its metadata, scope, and mode params but
// omits per-device targets and the decision snapshot; use GetCurtailmentEvent
// for full per-target detail.
message ListActiveCurtailmentsRequest {}

message ListActiveCurtailmentsResponse {
    // Most-recent first. Empty when nothing is pending, active, or restoring.
    repeated CurtailmentEvent events = 1;
}

// ListCurtailmentEvents returns historical events. Each event omits
// `target_rollup`/`targets`, scrubs webhook trigger metadata
// (`external_source`, `external_reference`, `idempotency_key`), and
// ships a trimmed `decision_snapshot` where the per-device `skipped`
// array is collapsed into `skipped_aggregate` (reason → count). Use
// GetCurtailmentEvent for the full per-target shape and untrimmed
// trigger attribution.
message ListCurtailmentEventsRequest {
    int32 page_size = 1 [(buf.validate.field).int32 = {
        gte: 0
        lte: 200
    }];

    // Opaque cursor; empty for first page. Capped to bound the decode path.
    string page_token = 2 [(buf.validate.field).string.max_len = 1024];

    // Optional legacy state filter; unspecified returns all states.
    // Prefer state_filters for new clients.
    CurtailmentEventState state_filter = 3 [(buf.validate.field).enum.defined_only = true];

    // Optional state filters; empty returns all states. When this is set, it
    // takes precedence over the legacy singular state_filter field.
    repeated CurtailmentEventState state_filters = 4 [(buf.validate.field).repeated = {
        unique: true
        max_items: 7
        items: { enum: { defined_only: true } }
    }];
}

message ListCurtailmentEventsResponse {
    repeated CurtailmentEvent events = 1;

    // Empty when no further pages remain.
    string next_page_token = 2;
}

message GetCurtailmentEventRequest {
    string event_uuid = 1 [(buf.validate.field).string.min_len = 1];

    // Number of targets to return in event.targets. Zero uses the server
    // default; capped to keep large fleet activity expansion responsive.
    int32 target_page_size = 2 [(buf.validate.field).int32 = {
        gte: 0
        lte: 1000
    }];

    // Opaque target cursor; empty for first page. Reuse with the same
    // event_uuid only.
    string target_page_token = 3 [(buf.validate.field).string.max_len = 1024];
}

message GetCurtailmentEventResponse {
    CurtailmentEvent event = 1;

    // Empty when all targets for this event have been returned.
    string next_target_page_token = 2;
}

message AdminTerminateEventRequest {
    reserved 4;
    reserved "idempotency_key";

    string event_uuid = 1 [(buf.validate.field).string.min_len = 1];

    // Restricted to CANCELLED (=6) or FAILED (=7); active events must call
    // StopCurtailment first so compensating Uncurtails fire.
    CurtailmentEventState target_state = 2 [(buf.validate.field).enum = {
        defined_only: true
        in: [6, 7]
    }];

    // Reason is recorded on the audit row and on every swept target's
    // last_error; capped to bound the fanout.
    string reason = 3 [(buf.validate.field).string = {min_len: 1, max_len: 256}];

}

message AdminTerminateEventResponse {
    CurtailmentEvent event = 1;
}

message IngestCurtailmentSignalRequest {
    // Provider identifier; must match a registered adapter. max_len is
    // intentionally tighter than StartCurtailmentRequest.external_source
    // (256) — provider names are short identifiers ("ercot-qse",
    // "voltus", "openadr3"); the validator catches misconfigured callers.
    string external_source = 1 [(buf.validate.field).string = {
        min_len: 1
        max_len: 64
    }];

    // Provider-assigned dispatch ID; forms the idempotency key with external_source.
    string external_reference = 2 [(buf.validate.field).string = {
        min_len: 1
        max_len: 256
    }];

    // Raw provider payload; adapter decodes and validates.
    bytes signal_payload = 3 [(buf.validate.field).bytes = {
        min_len: 1
        max_len: 65536
    }];

    // Optional scope override; adapter picks the default when unset.
    oneof scope_override {
        ScopeWholeOrg   whole_org_override          = 10;
        ScopeDeviceSets device_set_ids_override     = 11;
        ScopeDeviceList device_identifiers_override = 12;
    }

    // Operator-facing free text.
    string reason = 20 [(buf.validate.field).string.max_len = 256];
}

message IngestCurtailmentSignalResponse {
    CurtailmentEvent event = 1;

    // True when a new event was inserted; false when an in-flight event was echoed.
    bool created = 2;

    // Soft adapter warnings; hard rejections return InvalidArgument instead.
    repeated string adapter_warnings = 3;
}

// ScopeSite selects every miner assigned to one site in the caller organization.
message ScopeSite {
    int64 site_id = 1 [(buf.validate.field).int64.gt = 0];
}

// --- MQTT source settings ---

enum MqttCurtailmentSourceRuntimeState {
    MQTT_CURTAILMENT_SOURCE_RUNTIME_STATE_UNSPECIFIED = 0;
    MQTT_CURTAILMENT_SOURCE_RUNTIME_STATE_DISABLED    = 1;
    MQTT_CURTAILMENT_SOURCE_RUNTIME_STATE_STOPPED     = 2;
    MQTT_CURTAILMENT_SOURCE_RUNTIME_STATE_STARTING    = 3;
    MQTT_CURTAILMENT_SOURCE_RUNTIME_STATE_RUNNING     = 4;
    MQTT_CURTAILMENT_SOURCE_RUNTIME_STATE_ERROR       = 5;
}

message MqttCurtailmentSource {
    reserved 10, 11, 13, 15;
    reserved "curtail_mode", "contracted_curtailment_kw", "scope", "min_curtailed_duration_sec";

    int64 source_id = 1;
    string source_name = 2;
    string topic = 3;
    string broker_primary_host = 4;
    string broker_secondary_host = 5;
    int32 broker_port = 6;
    string broker_transport = 7;
    string mqtt_username = 8;
    bool has_password = 9;

    string payload_format = 12;
    uint32 staleness_threshold_sec = 14;
    bool enabled = 16;

    google.protobuf.Timestamp created_at = 18;
    google.protobuf.Timestamp updated_at = 19;

    MqttCurtailmentSourceStatus status = 30;
}

message MqttCurtailmentSourceStatus {
    reserved 14, 15, 20, 21, 22, 23, 24, 25, 26;
    reserved "last_edge_at", "last_edge_event_uuid", "pending_direction", "pending_target",
        "pending_target_at", "pending_received_at", "pending_received_broker",
        "pending_prior_edge_at", "pending_retry_at";

    MqttCurtailmentSourceRuntimeState runtime_state = 1;
    string last_runtime_error = 2;
    int32 running_broker_count = 3;
    int32 subscribed_broker_count = 4;
    bool stale = 5;

    string last_target = 10;
    google.protobuf.Timestamp last_target_at = 11;
    google.protobuf.Timestamp last_received_at = 12;
    string last_received_broker = 13;
}

message ListMqttCurtailmentSourcesRequest {}

message ListMqttCurtailmentSourcesResponse {
    repeated MqttCurtailmentSource sources = 1;
}

message GetMqttCurtailmentSourceRequest {
    int64 source_id = 1 [(buf.validate.field).int64.gt = 0];
}

message GetMqttCurtailmentSourceResponse {
    MqttCurtailmentSource source = 1;
}

message CreateMqttCurtailmentSourceRequest {
    reserved 9, 10, 12, 14, 15;
    reserved "curtail_mode", "contracted_curtailment_kw", "scope", "min_curtailed_duration_sec", "enabled";

    string source_name = 1 [(buf.validate.field).string = { min_len: 1, max_len: 64 }];
    string topic = 2 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    string broker_primary_host = 3 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    string broker_secondary_host = 4 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    int32 broker_port = 5 [(buf.validate.field).int32 = { gte: 0, lt: 65536 }];
    string broker_transport = 6 [(buf.validate.field).string.max_len = 8];
    string mqtt_username = 7 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    string mqtt_password = 8 [(buf.validate.field).string = { min_len: 1, max_len: 1024 }];

    string payload_format = 11 [(buf.validate.field).string.max_len = 64];
    uint32 staleness_threshold_sec = 13;
}

message CreateMqttCurtailmentSourceResponse {
    MqttCurtailmentSource source = 1;
}

message UpdateMqttCurtailmentSourceRequest {
    reserved 10, 11, 12, 14, 17, 18;
    reserved "curtail_mode", "contracted_curtailment_kw", "clear_contracted_curtailment_kw",
        "scope", "min_curtailed_duration_sec", "clear_min_curtailed_duration_sec";

    int64 source_id = 1 [(buf.validate.field).int64.gt = 0];

    optional string source_name = 2 [(buf.validate.field).string = { min_len: 1, max_len: 64 }];
    optional string topic = 3 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    optional string broker_primary_host = 4 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    optional string broker_secondary_host = 5 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    optional int32 broker_port = 6 [(buf.validate.field).int32 = { gte: 0, lt: 65536 }];
    optional string broker_transport = 7 [(buf.validate.field).string = { min_len: 1, max_len: 8 }];
    optional string mqtt_username = 8 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    optional string mqtt_password = 9 [(buf.validate.field).string = { min_len: 1, max_len: 1024 }];

    optional string payload_format = 13 [(buf.validate.field).string = { min_len: 1, max_len: 64 }];
    optional uint32 staleness_threshold_sec = 15;
    optional bool clear_staleness_threshold_sec = 16;
}

message UpdateMqttCurtailmentSourceResponse {
    MqttCurtailmentSource source = 1;
}

message TestMqttCurtailmentSourceConnectionRequest {
    string topic = 1 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    string broker_primary_host = 2 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    string broker_secondary_host = 3 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    int32 broker_port = 4 [(buf.validate.field).int32 = { gte: 0, lt: 65536 }];
    string broker_transport = 5 [(buf.validate.field).string.max_len = 8];
    string mqtt_username = 6 [(buf.validate.field).string = { min_len: 1, max_len: 255 }];
    string mqtt_password = 7 [(buf.validate.field).string = { min_len: 1, max_len: 1024 }];
    string payload_format = 8 [(buf.validate.field).string.max_len = 64];
}

message MqttCurtailmentSourceConnectionResult {
    string broker = 1;
    string broker_role = 2;
    bool connected = 3;
    bool subscribed = 4;
    string error = 5;
}

message TestMqttCurtailmentSourceConnectionResponse {
    bool ok = 1;
    repeated MqttCurtailmentSourceConnectionResult results = 2;
}

message SetMqttCurtailmentSourceEnabledRequest {
    int64 source_id = 1 [(buf.validate.field).int64.gt = 0];
    bool enabled = 2;
}

message SetMqttCurtailmentSourceEnabledResponse {
    MqttCurtailmentSource source = 1;
}

message DeleteMqttCurtailmentSourceRequest {
    int64 source_id = 1 [(buf.validate.field).int64.gt = 0];
}

message DeleteMqttCurtailmentSourceResponse {}
