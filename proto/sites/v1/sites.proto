syntax = "proto3";

package sites.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "common/v1/fleet_list_stats.proto";
import "errors/v1/errors.proto";
import "google/protobuf/timestamp.proto";

// SiteService is the admin surface for sites: physical locations that
// group buildings, racks, and devices. Sites are optional; an org may
// run with zero sites and the app renders site-less.
service SiteService {
    // ListSites returns every live site in the caller's org with
    // attachment counts (device_count, building_count, rack_count) so
    // the delete-confirm dialog can render impact numbers without a
    // second round trip.
    rpc ListSites(ListSitesRequest) returns (ListSitesResponse);

    // ResolveSiteBySlug returns the live site for a scoped-route slug.
    // Unlike ListSites, this can be authorized against the resolved
    // site id, so site-scoped operators do not need org-wide catalog
    // access just to enter /{siteSlug}/... routes.
    rpc ResolveSiteBySlug(ResolveSiteBySlugRequest)
        returns (ResolveSiteBySlugResponse);

    // CreateSite inserts a new site. Name must be unique within the
    // org. network_config is parsed and canonicalized server-side;
    // the response carries the canonical form.
    rpc CreateSite(CreateSiteRequest) returns (CreateSiteResponse);

    // UpdateSite mutates name + descriptive fields + network_config.
    // Same canonicalization + validation as CreateSite.
    rpc UpdateSite(UpdateSiteRequest) returns (UpdateSiteResponse);

    // DeleteSite soft-deletes the site and, in the same transaction,
    // cascades to its buildings (soft-delete) and racks (unassign).
    // Cascade impact counts are returned so the UI can surface the
    // result in a toast/activity row.
    rpc DeleteSite(DeleteSiteRequest) returns (DeleteSiteResponse);

    // AssignDevicesToSite is an all-or-nothing bulk update of
    // device.site_id. If any device is in a rack whose site_id differs
    // from the target, the entire batch rejects with per-device error
    // details and no row is touched. Omit target_site_id (or leave it
    // unset) to move devices to the "Unassigned" bucket.
    rpc AssignDevicesToSite(AssignDevicesToSiteRequest)
        returns (AssignDevicesToSiteResponse);

    // AssignBuildingsToSite moves one or more buildings to a target site
    // (or to "Unassigned" when target_site_id is unset). All updates run
    // in a single transaction; if any building fails, the batch rolls
    // back. The same transaction cascades site_id down to each
    // building's racks and their devices. Returns the aggregate cascade
    // counts across every building in the batch.
    rpc AssignBuildingsToSite(AssignBuildingsToSiteRequest)
        returns (AssignBuildingsToSiteResponse);

    // AssignRacksToSite moves one or more racks to a target site (or
    // to "Unassigned" when target_site_id is unset) as a partial
    // update — the rack's label, layout, members, and slot
    // assignments stay untouched, only site_id changes. building_id is
    // auto-cleared on any site transition since a building belongs to
    // a single site; the response carries the count of racks whose
    // building was cleared so the UI can prompt for re-assignment.
    // Same transaction cascades device.site_id for every rack member.
    rpc AssignRacksToSite(AssignRacksToSiteRequest)
        returns (AssignRacksToSiteResponse);

    // GetInfrastructureControlSubnets returns the site's commissioned OT
    // control-subnet allowlist. This sensitive topology is intentionally
    // separate from Site and requires an interactive ADMIN/SUPER_ADMIN
    // session with org-wide site:manage.
    rpc GetInfrastructureControlSubnets(GetInfrastructureControlSubnetsRequest)
        returns (GetInfrastructureControlSubnetsResponse);

    // SetInfrastructureControlSubnets explicitly replaces the site's
    // commissioned OT control-subnet allowlist. An empty list decommissions
    // the site and disables future infrastructure writes. The server
    // validates, canonicalizes, sorts, persists, and audits the replacement.
    // Requires an interactive ADMIN/SUPER_ADMIN session with org-wide
    // site:manage.
    rpc SetInfrastructureControlSubnets(SetInfrastructureControlSubnetsRequest)
        returns (SetInfrastructureControlSubnetsResponse);

    // GetSiteStats returns server-rolled telemetry + miner-state counts
    // for every device assigned to the site, including devices whose
    // rack has no building set and devices that have no rack at all.
    // Drives the /sites operational overview metric row.
    rpc GetSiteStats(GetSiteStatsRequest) returns (GetSiteStatsResponse);
}

// Site is the read shape returned by Get/List/Create/Update RPCs.
message Site {
    int64 id = 1;
    string name = 2;
    reserved 3;            // was: description — superseded by notes.
    reserved "description";
    string location_city = 4;
    string location_state = 5;
    // timezone is the operator-set IANA id when present, otherwise the
    // server-inferred id from (country, location_state). Empty when
    // neither resolves. Operators override the inference for
    // sub-state edge cases (e.g. North Idaho is Pacific, not Mountain).
    string timezone = 6;
    // power_capacity_mw is 0 when unset; otherwise megawatts as a
    // floating-point number.
    double power_capacity_mw = 7;
    // network_config is the canonicalized newline-separated CIDR
    // list as stored. Empty when unset.
    string network_config = 8;

    google.protobuf.Timestamp created_at = 9;
    google.protobuf.Timestamp updated_at = 10;

    string address     = 11;
    reserved 12;            // was: address_line2 — collapsed into address.
    reserved "address_line2";
    string postal_code = 13;
    // ISO 3166-1 alpha-2 country code. Defaults to "US" at the DB
    // level; clients can leave empty on create and the server uses the
    // default.
    string country     = 14;
    // Free-form operator notes. No structure enforced.
    string notes       = 15;
    // Sites are root placements, so this is currently empty. Present
    // for shape consistency with building, rack, and miner list rows.
    common.v1.PlacementRefs placement = 16;
    // URL-safe, immutable alias generated by the server for scoped app
    // routes. Numeric id remains the API identifier for filters and
    // mutations; slug is read-only for v1.
    string slug = 17;
}

// SiteWithCounts pairs a Site with its attachment counts. Returned by
// ListSites so the delete-confirm dialog has the impact numbers.
message SiteWithCounts {
    Site site = 1;
    int64 device_count = 2;
    int64 building_count = 3;
    int64 rack_count = 4;
    // Lightweight list/table rollup. Omitted when the caller is not
    // authorized for telemetry stats.
    common.v1.FleetListStats list_stats = 5;
    // Count of controllable infrastructure devices (e.g. facility fans)
    // attached to the site. Included so the delete-confirm dialog can
    // surface the full cascade impact.
    int64 infrastructure_device_count = 6;
}

// ListSites

message ListSitesRequest {
    // Filter sites whose rolled-up devices have any open issue matching
    // these component types. OR within the list, AND with other filters.
    repeated errors.v1.ComponentType error_component_types = 1;

    // Filter by rolled-up telemetry values for the site. Multiple ranges
    // are AND'd.
    repeated common.v1.FleetListTelemetryRangeFilter telemetry_ranges = 2;
}

message ListSitesResponse {
    repeated SiteWithCounts sites = 1;
}

// ResolveSiteBySlug

message ResolveSiteBySlugRequest {
    string slug = 1 [(buf.validate.field).string = {min_len: 1, max_len: 63}];
}

message ResolveSiteBySlugResponse {
    Site site = 1;
}

// CreateSite

message CreateSiteRequest {
    string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    reserved 2;            // was: description — superseded by notes.
    reserved "description";
    string location_city = 3 [(buf.validate.field).string.max_len = 255];
    string location_state = 4 [(buf.validate.field).string.max_len = 255];
    // IANA timezone id. Empty falls back to server inference from
    // (country, location_state); a non-empty value is stored verbatim
    // and overrides inference on read.
    string timezone = 5 [(buf.validate.field).string.max_len = 64];
    // Megawatts; 0 = no capacity recorded.
    double power_capacity_mw = 6 [(buf.validate.field).double.gte = 0];
    // Newline-separated CIDR/IP entries. Server canonicalizes,
    // applies the /20 broadest-mask cap, and rejects within-site
    // overlaps with InvalidArgument; cross-site overlaps surface as
    // a warning string in the response, not a block.
    string network_config = 7 [(buf.validate.field).string.max_bytes = 16384];

    string address     = 8  [(buf.validate.field).string.max_len = 255];
    reserved 9;            // was: address_line2 — collapsed into address.
    reserved "address_line2";
    string postal_code = 10 [(buf.validate.field).string.max_len = 32];
    // ISO 3166-1 alpha-2. Empty falls back to the DB default ("US").
    string country     = 11 [(buf.validate.field).string.max_len = 2];
    // Free-form operator notes.
    string notes       = 12 [(buf.validate.field).string.max_len = 4096];
}

message CreateSiteResponse {
    Site site = 1;
    // network_config_warnings carries cross-site overlap warnings or
    // any other non-blocking validation note. UI shows them as a
    // soft warning; presence does not indicate failure.
    repeated string network_config_warnings = 2;
}

// UpdateSite

message UpdateSiteRequest {
    int64 id = 1 [(buf.validate.field).int64.gt = 0];
    string name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    reserved 3;            // was: description — superseded by notes.
    reserved "description";
    string location_city = 4 [(buf.validate.field).string.max_len = 255];
    string location_state = 5 [(buf.validate.field).string.max_len = 255];
    string timezone = 6 [(buf.validate.field).string.max_len = 64];
    double power_capacity_mw = 7 [(buf.validate.field).double.gte = 0];
    string network_config = 8 [(buf.validate.field).string.max_bytes = 16384];

    string address     = 9  [(buf.validate.field).string.max_len = 255];
    reserved 10;            // was: address_line2 — collapsed into address.
    reserved "address_line2";
    string postal_code = 11 [(buf.validate.field).string.max_len = 32];
    string country     = 12 [(buf.validate.field).string.max_len = 2];
    string notes       = 13 [(buf.validate.field).string.max_len = 4096];
}

message UpdateSiteResponse {
    Site site = 1;
    repeated string network_config_warnings = 2;
}

// DeleteSite

message DeleteSiteRequest {
    int64 id = 1 [(buf.validate.field).int64.gt = 0];
}

message DeleteSiteResponse {
    // Cascade impact counts from the same transaction.
    int64 unassigned_device_count = 1;
    int64 deleted_building_count  = 2;
    int64 unassigned_rack_count   = 3;
    // Infrastructure devices (facility fans) soft-deleted by the
    // cascade.
    int64 deleted_infrastructure_device_count = 4;
}

// AssignDevicesToSite

message AssignDevicesToSiteRequest {
    // Unset = move to the "Unassigned" bucket. When present, must be > 0.
    optional int64 target_site_id = 1 [(buf.validate.field).int64.gt = 0];
    repeated string device_identifiers = 2 [(buf.validate.field).repeated = {
        min_items: 1
        max_items: 10000
        items: {string: {min_len: 1, max_len: 256}}
    }];
    // When true, the server — inside the same transaction as the site
    // write — removes any conflicting rack memberships for the listed
    // devices before applying the site assignment. This closes the
    // cross-site reparent orphan window the client-side
    // remove-then-assign loop in MinerReparentPicker had: a transport
    // failure between the per-rack unassign and the site reassign
    // would leave miners rack-less but still pinned to the old site.
    //
    // When false (default), preserves today's behavior: any device
    // currently in a rack at a different site rejects the whole batch
    // with a PerDeviceConflict[] of DEVICE_IN_RACK_AT_OTHER_SITE.
    optional bool force_clear_conflicting_rack_membership = 3;
}

// PerDeviceConflictReason enumerates the reasons a device can be
// rejected by AssignDevicesToSite.
enum PerDeviceConflictReason {
    PER_DEVICE_CONFLICT_REASON_UNSPECIFIED                  = 0;
    PER_DEVICE_CONFLICT_REASON_DEVICE_NOT_FOUND             = 1;
    PER_DEVICE_CONFLICT_REASON_DEVICE_IN_RACK_AT_OTHER_SITE = 2;
}

// PerDeviceConflict carries the per-device error details surfaced
// when AssignDevicesToSite rejects. The whole batch is rejected;
// no rows are mutated.
message PerDeviceConflict {
    string device_identifier = 1;
    PerDeviceConflictReason reason = 2;
    // When reason == DEVICE_IN_RACK_AT_OTHER_SITE: the site_id of the
    // device's rack. 0 otherwise.
    int64 conflicting_site_id = 3;
}

message AssignDevicesToSiteResponse {
    int64 reassigned_count = 1;
    // Populated only on rejection. Empty on success.
    repeated PerDeviceConflict conflicts = 2;
}

// AssignBuildingsToSite

message AssignBuildingsToSiteRequest {
    repeated int64 building_ids = 1 [(buf.validate.field).repeated = {
        min_items: 1
        max_items: 1000
        items: {int64: {gt: 0}}
    }];
    // Unset = move buildings to "Unassigned". When present, must be > 0.
    optional int64 target_site_id = 2 [(buf.validate.field).int64.gt = 0];
}

message AssignBuildingsToSiteResponse {
    // Cascade impact: how many racks and devices were re-stamped with
    // the new site_id in the same transaction, aggregated across every
    // building in the batch.
    int64 reassigned_rack_count   = 1;
    int64 reassigned_device_count = 2;
}

// AssignRacksToSite

message AssignRacksToSiteRequest {
    repeated int64 rack_ids = 1 [(buf.validate.field).repeated = {
        min_items: 1
        max_items: 1000
        items: {int64: {gt: 0}}
    }];
    // Unset = move racks to "Unassigned" (site_id NULL). When present,
    // must be > 0.
    optional int64 target_site_id = 2 [(buf.validate.field).int64.gt = 0];
}

message AssignRacksToSiteResponse {
    // Cascade impact: how many devices had their site_id re-stamped
    // across every rack in the batch.
    int64 reassigned_device_count = 1;
    // Number of racks whose building_id was cleared because the move
    // crossed site boundaries. UI can use this to prompt for
    // re-assignment to a building in the new site.
    int64 cleared_building_count = 2;
}

// Infrastructure control-subnet commissioning

message GetInfrastructureControlSubnetsRequest {
    int64 site_id = 1 [(buf.validate.field).int64.gt = 0];
}

message GetInfrastructureControlSubnetsResponse {
    int64 site_id = 1;
    // Canonical CIDR strings in stable lexical order.
    repeated string infrastructure_control_subnets = 2;
}

message SetInfrastructureControlSubnetsRequest {
    int64 site_id = 1 [(buf.validate.field).int64.gt = 0];
    // Full replacement. Empty decommissions the site. Domain validation
    // additionally restricts values to RFC1918 prefixes (IPv4, /20 or
    // narrower) or ULA host prefixes (IPv6, /128) and rejects overlap.
    repeated string infrastructure_control_subnets = 2 [(buf.validate.field).repeated = {
        max_items: 256
        items: {string: {min_len: 1, max_len: 64}}
    }];
}

message SetInfrastructureControlSubnetsResponse {
    int64 site_id = 1;
    // Canonical CIDR strings in stable lexical order.
    repeated string infrastructure_control_subnets = 2;
}

// GetSiteStats

message GetSiteStatsRequest {
    int64 site_id = 1 [(buf.validate.field).int64.gt = 0];
}

// GetSiteStatsResponse mirrors device_set.v1.DeviceSetStats for the
// rollup-shaped fields. Scope is every device with site_id = request.site_id
// (racked or not) — the /sites overview joins this onto the site row.
message GetSiteStatsResponse {
    int64  site_id           = 1;
    int32  building_count    = 2;
    int32  device_count      = 3;
    int32  reporting_count   = 4;
    double total_hashrate_ths = 5;
    double avg_efficiency_jth = 6;
    double total_power_kw     = 7;
    // Fleet-health buckets mirror DeviceSetStats so the colour map stays
    // consistent across surfaces.
    int32  hashing_count     = 8;
    int32  broken_count      = 9;
    int32  offline_count     = 10;
    int32  sleeping_count    = 11;
    // Per-field reporting counts so the FE can distinguish "no devices
    // reporting" from "devices reporting but the field is missing." A
    // reporting device with EfficiencyJH = nil shouldn't make the average
    // look like real data; if efficiency_reporting_count == 0 the FE shows
    // the dash even when reporting_count > 0.
    int32  hashrate_reporting_count    = 12;
    int32  efficiency_reporting_count  = 13;
    int32  power_reporting_count       = 14;
    double min_temperature_c           = 15;
    double max_temperature_c           = 16;
    int32  temperature_reporting_count = 17;
    int32  control_board_issue_count   = 18;
    int32  fan_issue_count             = 19;
    int32  hash_board_issue_count      = 20;
    int32  psu_issue_count             = 21;
    int32  rack_count                  = 22;
}
